/* Container for the death options buttons */
#deathOptions {
  display: grid;
  grid-gap: 1rem;
  grid-template-columns: repeat(1, 1fr);
  justify-items: center;
  align-items: center;
  padding: 1rem;
}

/* Base styles for both buttons */
#deathOptions button {
  font-family: 'Roboto', sans-serif;
  font-size: 3rem;
  padding: 1rem 2rem;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  transition: transform 0.2s ease, box-shadow 0.2s ease;
  color: #fff;
  text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.5);

/* Specific styles */
/* Remove default button styling */
#respawnBtn {
  background: none;
  border: none;
  padding: 0;
  margin: 0.5rem;
  font-size: 2rem;
  font-weight: bold;
  color: #fff;
  cursor: pointer;
  outline: none;
width: 100%;
}

/* Make each letter inline-block so we can animate them individually */
#respawnBtn span {
  display: inline-block;
}

/* Define the wave keyframes */
@keyframes wave {
  0%, 60%, 100% {
    transform: translateY(0);
  }
  30% {
    transform: translateY(-10px);
  }
}

/* Trigger the animation on hover, active, or touch */
#respawnBtn:hover span,
#respawnBtn:active span {
  animation: wave 0.6s ease-in-out;
  animation-fill-mode: forwards;
}

/* Cascade delays for each letter */
#respawnBtn span:nth-child(1) { animation-delay: 0s; }
#respawnBtn span:nth-child(2) { animation-delay: 0.05s; }
#respawnBtn span:nth-child(3) { animation-delay: 0.1s; }
#respawnBtn span:nth-child(4) { animation-delay: 0.15s; }
#respawnBtn span:nth-child(5) { animation-delay: 0.2s; }
#respawnBtn span:nth-child(6) { animation-delay: 0.25s; }
#respawnBtn span:nth-child(7) { animation-delay: 0.3s; }

#viewMenuBtn {

  box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
 z-index: 5000;

}

/* Hover effects for both buttons */
#deathOptions button:hover {
  transform: scale(1.05);
  box-shadow: 0 6px 8px rgba(0, 0, 0, 0.4);

/* Mobile responsiveness: on small screens, stack buttons in a single column and increase size */

    /* --- Headbutt Effect Styling --- */
     
/* Container that will always be positioned at the player's center */
#daggerContainer {

  position: absolute;
  pointer-events: none;     
      height: 0px;
   transform: translate(10%, -10%) scaleX(-1) scaleY(-1);
}

#headbuttEffect {
  left: 50px;
  font-size: 20px;
  line-height: 20px;
  text-align: center;
  transform-origin: 118% 0%; /* keep the original pivot */
  transform: rotate(90deg) translate(0, 0);
  opacity: 0;
}

#headbuttEffect.active {
  /* Run two animations simultaneously:
     - headbuttPivot moves/scales the dagger.
     - trailShadow animates a drop-shadow that appears as a trailing blur.
  */
  animation: headbuttPivot 0.2s ease-out forwards, 
             trailShadow 0.2s ease-out forwards;
}

@keyframes headbuttPivot {
  0% {
    transform: rotate(-20deg) translate(0, 0);
    opacity: 1;
  }
  /* Slightly extend out while keeping close to the pivot */
  20% {
    transform: rotate(90deg) translate(3px, -3px);
    opacity: 1;
  }
  /* Rotate slightly past the final rotation */
  50% {
    transform: rotate(calc(var(--rotation, 0deg) + 15deg)) translate(5px, -5px);
    opacity: 1;
  }
  /* Swing back to the final rotation with the same slight offset */
  70% {
    transform: rotate(var(--rotation, 0deg)) translate(3px, -3px);
    opacity: 1;
  }
  /* Swiftly scale down and fade out */
  100% {
    transform: rotate(var(--rotation, 0deg)) translate(3px, -3px) scale(0);
    opacity: 0;
  }
}

@keyframes trailShadow {
  0% {
    filter: drop-shadow(0px 0px 0px lightblue);
  }
  20% {
    filter: drop-shadow(1px -1px 1px lightblue);
  }
  50% {
    filter: drop-shadow(5px -45px 5px lightblue);
  }
  70% {
    filter: drop-shadow(2px -35px 2px lightblue);
  }
  100% {
    filter: drop-shadow(1px -8px 2px lightblue);
  }
}

// ✅ Fast, overlap-allowed playback — reuses pool nodes, no new allocations
const soundCooldowns = {};

function playSFX(sound, cooldown = 100) {
  const now = performance.now();

  if (soundCooldowns[sound] && now - soundCooldowns[sound] < cooldown) {
    return;
  }

  soundCooldowns[sound] = now;

  const pool = sfx[sound];
  if (pool) {
    const audio = pool.find(a => a.paused || a.ended) || pool[0];
    audio.currentTime = 0;
    audio.volume = 1.0;
    audio.play().catch(err => console.warn(`SFX Error: ${err}`));
  }
}

// Helper to return a random number between min and max.
function randomBetween(min, max) {
  return Math.random() * (max - min) + min;
}

// ---------- WEATHER SYSTEM ----------

// Possible states: "sunshine", "rain", "fog", "thunderstorm"
let weatherState = "sunshine";
let weatherTimer = randomBetween(270, 450);

// Transition blending
let prevWeatherState = "sunshine";
let weatherTransitionT = 1.0;       // 1.0 = fully in new state, counts up from 0
const WEATHER_TRANSITION_DUR = 4.0; // seconds to crossfade

// Thunder state (module-level so it persists across frames)
let lightningTimer = randomBetween(5, 10);
let thunderTintAlpha = 0;
const THUNDER_FADE_RATE = 2.0;  // alpha units per second (builds up fast)
const THUNDER_MAX_ALPHA = 0.35;

// Single reusable lightning flash element
const lightningFlashEl = document.createElement("div");
lightningFlashEl.style.cssText = "position:fixed;top:0;left:0;width:100vw;height:100vh;background:white;opacity:0;pointer-events:none;z-index:99999;transition:opacity 0.15s ease-out";
document.body.appendChild(lightningFlashEl);
let lightningFlashTimeout = null;

function triggerLightningFlash() {
  if (lightningFlashTimeout) clearTimeout(lightningFlashTimeout);
  lightningFlashEl.style.transition = "none";
  lightningFlashEl.style.opacity = "0.85";
  lightningFlashTimeout = setTimeout(() => {
    lightningFlashEl.style.transition = "opacity 0.2s ease-out";
    lightningFlashEl.style.opacity = "0";
  }, 60);
}

function pickNewWeatherState() {
  const r = Math.random();
  if (r < 0.7)       return "sunshine";
  else if (r < 0.8)  return "rain";
  else if (r < 0.9)  return "fog";
  else               return "thunderstorm";
}

function updateWeather(deltaTime) {
  // Advance transition
  if (weatherTransitionT < 1.0) {
    weatherTransitionT = Math.min(weatherTransitionT + deltaTime / WEATHER_TRANSITION_DUR, 1.0);
  }

  // Timer: switch state
  weatherTimer -= deltaTime;
  if (weatherTimer <= 0) {
    const next = pickNewWeatherState();
    if (next !== weatherState) {
      prevWeatherState = weatherState;
      weatherTransitionT = 0.0;
    }
    weatherState = next;
    weatherTimer = randomBetween(270, 450);
  }

  // Thunder tint accumulation (only when fully in thunderstorm)
  if (weatherState === "thunderstorm") {
    lightningTimer -= deltaTime;
    thunderTintAlpha = Math.min(thunderTintAlpha + deltaTime * THUNDER_FADE_RATE, THUNDER_MAX_ALPHA);
    if (lightningTimer <= 0) {
      triggerLightningFlash();
      lightningTimer = randomBetween(5, 10);
      thunderTintAlpha = 0;
    }
  } else {
    // Decay tint when not in thunderstorm
    thunderTintAlpha = Math.max(thunderTintAlpha - deltaTime * THUNDER_FADE_RATE, 0);
  }
}

// Draw a single weather overlay given a state name and alpha multiplier
function _drawWeatherOverlay(ctx, state, alpha) {
  if (alpha <= 0) return;
  ctx.save();

  if (state === "sunshine") {
    const cx = canvas.width / 2, cy = canvas.height / 2;
    const r = Math.min(canvas.width, canvas.height) * 0.4;
    const angle = globalTime * 0.0175;
    const sunX = cx + r * Math.cos(angle);
    const sunY = cy + r * Math.sin(angle);
    const intensity = ((Math.sin(globalTime * 0.0175) + 1) / 2) * alpha;
    const grad = ctx.createRadialGradient(sunX, sunY, 0, sunX, sunY, canvas.width);
    grad.addColorStop(0, `rgba(255,255,200,${0.3 * intensity})`);
    grad.addColorStop(1, "rgba(255,255,200,0)");
    ctx.globalCompositeOperation = "lighter";
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

  } else if (state === "fog") {
    ctx.fillStyle = `rgba(200,200,200,${0.35 * alpha})`;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

  } else if (state === "rain") {
    ctx.fillStyle = `rgba(0,0,80,${0.12 * alpha})`;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

  } else if (state === "thunderstorm") {
    // Base dark tint
    ctx.fillStyle = `rgba(0,0,50,${0.35 * alpha})`;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    // Animated thunder tint on top
    if (thunderTintAlpha > 0) {
      ctx.fillStyle = `rgba(0,0,80,${thunderTintAlpha * alpha})`;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    }
  }

  ctx.restore();
}

function renderWeather(ctx) {
  const t = weatherTransitionT;
  if (t < 1.0) {
    // Crossfade: fade out previous, fade in new
    _drawWeatherOverlay(ctx, prevWeatherState, 1.0 - t);
    _drawWeatherOverlay(ctx, weatherState, t);
  } else {
    _drawWeatherOverlay(ctx, weatherState, 1.0);
  }
}

    function calculateRank(kills) {
  let rank = 0;
  let threshold = 100;
  let remainingKills = kills + Math.floor((typeof gemXP !== 'undefined' ? gemXP : 0));
  while (remainingKills >= threshold) {
    rank++;
    remainingKills -= threshold;
    threshold = Math.floor(threshold * 1.5);
  }
  return rank;
}

    function clamp(val, min, max) { return Math.min(Math.max(val, min), max); }
    
    class Vector2 {
      constructor(x, y) { this.x = x; this.y = y; }
      add(v) { return new Vector2(this.x + v.x, this.y + v.y); }
      subtract(v) { return new Vector2(this.x - v.x, this.y - v.y); }
      scale(s) { return new Vector2(this.x * s, this.y * s); }
      length() { return Math.sqrt(this.x * this.x + this.y * this.y); }
      normalize() { let len = this.length(); return new Vector2(this.x / (len || 1), this.y / (len || 1)); }
    }
    
    class Camera {
      constructor(screenWidth, screenHeight) {
        this.position = new Vector2(0, 0);
        this.zoom = 1.0;
        this.screenWidth = screenWidth;
        this.screenHeight = screenHeight;
      }
      worldToScreen(worldPos) {
        return new Vector2(
          (worldPos.x - this.position.x) * this.zoom + this.screenWidth / 2,
          (worldPos.y - this.position.y) * this.zoom + this.screenHeight / 2
        );
      }
      screenToWorld(screenPos) {
        return new Vector2(
          (screenPos.x - this.screenWidth / 2) / this.zoom + this.position.x,
          (screenPos.y - this.screenHeight / 2) / this.zoom + this.position.y
        );
      }
    }

            noiseValue = (noiseValue + 1) / 2;
    
            let tileType = 0;
            let color = "#7a8450"; // grass by default
    
            if (noiseValue < 0.3) {
              tileType = 1; // water
              color = "#4a6a8c";
            } else if (noiseValue < 0.5) {
              tileType = 2; // sand/beach
              color = "#d2b48c";
            } else if (noiseValue > 0.8) {
              tileType = 3; // mountain
              color = "#382b28";
            }
            row.push(new Tile(x, y, tileType, color));
          }
          this.tiles.push(row);
        }
      }
    
      gridToWorld(gridX, gridY) {
        return new Vector2(
          (gridX - gridY) * (this.tileWidth / 2),
          (gridX + gridY) * (this.tileHeight / 2)
        );
      }
    
      render(ctx, camera) {
        for (let y = 0; y < this.height; y++) {
          for (let x = 0; x < this.width; x++) {
            let worldPos = this.gridToWorld(x, y);
            let screenPos = camera.worldToScreen(worldPos);
            let halfW = this.tileWidth / 2, halfH = this.tileHeight / 2;
            ctx.beginPath();
            ctx.moveTo(screenPos.x, screenPos.y + halfH);
            ctx.lineTo(screenPos.x + halfW, screenPos.y);
            ctx.lineTo(screenPos.x + this.tileWidth, screenPos.y + halfH);
            ctx.lineTo(screenPos.x + halfW, screenPos.y + this.tileHeight);
            ctx.closePath();
            ctx.fillStyle = this.tiles[y][x].color;
            ctx.fill();
            ctx.strokeStyle = "rgba(0, 0, 0, 0.02)"; // 50% opacity black
            ctx.stroke();
            // Safe zone wall overlay
            if (this.tiles[y][x].tileType === 4) {
              const tile = this.tiles[y][x];
              const hpRatio = tile.zoneHP / tile.zoneMaxHP;
              ctx.fillStyle = `rgba(80,180,255,${0.55 + 0.35 * hpRatio})`;
              ctx.fill();
              ctx.strokeStyle = `rgba(0,120,255,0.9)`;
              ctx.lineWidth = 2;
              ctx.stroke();
              ctx.lineWidth = 1;
            }
          }
        }
      }

    // --- SAFE ZONE SYSTEM ---
    const ZONE_KILLS_PER_CHARGE = 50;  // kills needed per tile charge
    const ZONE_TILE_HP = 2;           // hits each wall tile can take before breaking
    const ZONE_RADIUS = 2;             // tiles radius around player when placing zone

    let zoneCharges = 0;               // number of wall tiles available to place
    let lastZoneKillMilestone = 0;     // tracks the last kill milestone we awarded

    // Track all placed safe zone tiles for update purposes
    const safeZoneTiles = new Set();   // stores "gridX,gridY" keys

    function updateZoneCharges() {
      if (calculateRank(killCount) < 1) return; // rank locked
      const milestone = Math.floor(killCount / ZONE_KILLS_PER_CHARGE);
      if (milestone > lastZoneKillMilestone) {
        const earned = milestone - lastZoneKillMilestone;
        zoneCharges += earned;
        lastZoneKillMilestone = milestone;
        showUpgradeAlert(`+${earned} Zone Tile${earned > 1 ? "s" : ""}!`);
      }
      updateAttackSlot();
    }

    function placeZone() {
      if (zoneCharges <= 0) return;
      if (calculateRank(killCount) < 1) {
        showUpgradeAlert("🔰 Reach Novice rank to use Safe Zones!");
        return;
      }

      const px = player.gridX, py = player.gridY;
      let placed = 0;

      // Place wall tiles in a ring at ZONE_RADIUS around the player
      for (let dx = -ZONE_RADIUS; dx <= ZONE_RADIUS; dx++) {
        for (let dy = -ZONE_RADIUS; dy <= ZONE_RADIUS; dy++) {
          const dist = Math.abs(dx) + Math.abs(dy); // manhattan distance
          if (dist !== ZONE_RADIUS) continue;       // only the ring, not interior
          const gx = px + dx, gy = py + dy;
          if (gx < 0 || gy < 0 || gx >= tileMap.width || gy >= tileMap.height) continue;
          const tile = tileMap.tiles[gy][gx];
          if (tile.tileType === 4) {
            // Already a wall — stack HP instead of skipping
            tile.zoneHP = Math.min(tile.zoneHP + ZONE_TILE_HP, ZONE_TILE_HP * 5);
            tile.zoneMaxHP = Math.max(tile.zoneMaxHP, tile.zoneHP);
            placed++;
            continue;
          }
          if (tile.tileType === 3) continue;        // don't overwrite mountains

          tile._prevTileType = tile.tileType;
          tile._prevColor = tile.color;
          tile.tileType = 4;
          tile.color = "#3a5a7a";
          tile.zoneHP = ZONE_TILE_HP;
          tile.zoneMaxHP = ZONE_TILE_HP;
          safeZoneTiles.add(`${gx},${gy}`);
          placed++;
        }
      }

      if (placed > 0) {
        zoneCharges--;
        playSFX("increase");
        showUpgradeAlert("Safe Zone placed!");
        updateAttackSlot();
      }
    }

    // Called each frame: enemies adjacent to zone walls attack them
    function updateSafeZones(deltaTime) {
      updateZoneCharges();

      if (safeZoneTiles.size === 0) return;

      // DOT: any enemy whose world position overlaps a zone tile takes continuous damage
      const CONTACT_RADIUS = tileMap.tileWidth * 0.6;
      const DOT_RATE = 3.0; // HP per second lost while in contact
      enemies.forEach(enemy => {
        if (!enemy.alive || enemy.deathTimer !== undefined) return;
        const ex = enemy.position.x + enemy.width / 2;
        const ey = enemy.position.y + enemy.height / 2;
        let inContact = false;

        safeZoneTiles.forEach(key => {
          const [gx, gy] = key.split(",").map(Number);
          const tile = tileMap.tiles[gy] && tileMap.tiles[gy][gx];
          if (!tile || tile.tileType !== 4) return;
          const tileWorld = tileMap.gridToWorld(gx, gy);
          const tx = tileWorld.x + tileMap.tileWidth / 2;
          const ty = tileWorld.y + tileMap.tileHeight / 2;
          const dist = Math.sqrt((ex - tx) * (ex - tx) + (ey - ty) * (ey - ty));
          if (dist < CONTACT_RADIUS) inContact = true;
        });

        if (inContact) {
          enemy.moving = false;
          enemy.position = tileMap.gridToWorld(enemy.gridX, enemy.gridY);
          if (!enemy._dotHP) enemy._dotHP = enemy.maxHP;
          enemy._dotHP -= DOT_RATE * deltaTime;
          if (enemy._dotHP <= 0) {
            enemy.deathTimer = 0.1;
          }
        } else {
          enemy._dotHP = undefined;
        }
      });

      // Tick per-tile attack cooldowns and find the closest attacker per tile
      const tileAttackers = {}; // key -> { enemy, dist }

      enemies.forEach(enemy => {
        if (enemy.deathTimer !== undefined) return; // already dying, skip
        // Only check adjacent tiles (not the tile the enemy stands on — those get fried)
        const dirs = [{dx:1,dy:0},{dx:-1,dy:0},{dx:0,dy:1},{dx:0,dy:-1}];
        dirs.forEach(({dx, dy}) => {
          const gx = enemy.gridX + dx, gy = enemy.gridY + dy;
          const key = `${gx},${gy}`;
          if (!safeZoneTiles.has(key)) return;
          const tile = tileMap.tiles[gy][gx];
          if (tile.tileType !== 4) { safeZoneTiles.delete(key); return; }
          const dist = Math.abs(dx) + Math.abs(dy);
          if (!tileAttackers[key] || dist < tileAttackers[key].dist) {
            tileAttackers[key] = { enemy, dist };
          }
        });
      });

      // Only the closest enemy damages each wall tile
      Object.entries(tileAttackers).forEach(([key, { enemy }]) => {
        const [gx, gy] = key.split(",").map(Number);
        const tile = tileMap.tiles[gy] && tileMap.tiles[gy][gx];
        if (!tile || tile.tileType !== 4) { safeZoneTiles.delete(key); return; }

        if (!tile._attackCooldown) tile._attackCooldown = 0;
        tile._attackCooldown -= deltaTime;
        if (tile._attackCooldown <= 0) {
          tile._attackCooldown = 0.75; // one hit every 1.5s regardless of crowd size
          tile.zoneHP--;
          tile._flashTimer = 0.25;
          if (tile.zoneHP <= 0) {
            tile.tileType = tile._prevTileType;
            tile.color = tile._prevColor;
            delete tile.zoneHP;
            delete tile.zoneMaxHP;
            delete tile._attackCooldown;
            safeZoneTiles.delete(key);
            showUpgradeAlert("Zone breached!");
            playSFX("playerDamage");
          }
        }
      });

      // Tick flash timers on wall tiles
      safeZoneTiles.forEach(key => {
        const [gx, gy] = key.split(",").map(Number);
        const tile = tileMap.tiles[gy] && tileMap.tiles[gy][gx];
        if (!tile || tile.tileType !== 4) { safeZoneTiles.delete(key); return; }
        if (tile._flashTimer > 0) {
          tile._flashTimer -= deltaTime;
          tile.color = tile._flashTimer > 0 ? "#c03030" : "#3a5a7a";
        }
      });
    }

    function computeDirection(clientX, clientY) {
      let rect = canvas.getBoundingClientRect();
      let tapX = clientX - rect.left, tapY = clientY - rect.top;
      let worldPos = camera.screenToWorld(new Vector2(tapX, tapY));
      let gridX = Math.floor((worldPos.x/32+worldPos.y/16)/2);
      let gridY = Math.floor((worldPos.y/16 - worldPos.x/32)/2);
      if(gridX===player.gridX && gridY===player.gridY) return null;
      let dx = gridX - player.gridX, dy = gridY - player.gridY;
      let direction;
      if(Math.abs(dx)+Math.abs(dy)===1)
        direction = dx===1?"right": dx===-1?"left": dy===1?"down":"up";
      else
        direction = Math.abs(dx)>=Math.abs(dy) ? (dx>0?"right":"left") : (dy>0?"down":"up");
      return direction;
    }

function applyDamage(damage) {
  // Check if player has Heavy Armour.
  if (player.heavyArmour) {
    let remainingDurability = player.heavyArmour.durability - damage;
    if (remainingDurability > 0) {
      // Armour fully absorbs the damage.
      player.heavyArmour.durability = remainingDurability;
      console.log("Armour absorbed damage. New durability:", player.heavyArmour.durability);
      updateInventoryDisplay();
      // Set glow timer so the heavy armour effect is visible.
      player.heavyArmorGlowTimer = 0.5;
      return; // Exit so no HP is lost.
    } else {
      // Armour is broken; calculate the leftover damage.
      damage = -remainingDurability;
      player.heavyArmour = null;
      showUpgradeAlert("Heavy Armour destroyed!");
      updateInventoryDisplay();
    }
  }
  
  // Apply any remaining damage to the player's HP.
  player.hp -= damage;
  console.log("Player HP:", player.hp);
  player.flashDamage();
}

class RainDrop {
  constructor() {
    this.reset(true);
  }
  reset(initial = false) {
    this.x = Math.random() * canvas.width;
    this.y = initial ? Math.random() * canvas.height : 0;
    this.speedY = 300 + Math.random() * 200;
    this.length = 10 + Math.random() * 10;
    this.opacity = 0.2 + Math.random() * 0.3;
  }
  update(deltaTime) {
    this.y += this.speedY * deltaTime;
    if (this.y > canvas.height) this.reset();
  }
  render(ctx) {
    ctx.strokeStyle = `rgba(174,194,224,${this.opacity})`;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(this.x, this.y);
    ctx.lineTo(this.x, this.y + this.length);
    ctx.stroke();
  }
}

// Lighting effect: Draw an overlay with a radial gradient
function applyLighting(ctx) {
  // ----- DAY/NIGHT CYCLE OVERLAY -----
  // Full cycle lasts 120 seconds (adjust as desired)
  const cyclePeriod = 360;
  // Normalized time (0 to 1) over the cycle; t=0 and t=1 represent midnight,
  // while t=0.5 is midday.
  const t = (globalTime % cyclePeriod) / cyclePeriod;
  // Compute brightness using a sine function so brightness peaks at midday.
  // Adjust these numbers to control how dark or light your scene gets.
  const brightness = 0.3 + 0.7 * Math.sin(t * Math.PI);
  // The overlay opacity is higher when brightness is lower.
  const overlayAlpha = 1 - brightness;
  
  // Draw a full‑screen rectangle in dark blue with "multiply" blending to darken the scene.
  ctx.save();
  ctx.globalCompositeOperation = "multiply";
  ctx.fillStyle = `rgba(0, 0, 50, ${overlayAlpha})`;
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.restore();
  
 // ----- ORBITING SPOTLIGHT EFFECT -----

 
}
