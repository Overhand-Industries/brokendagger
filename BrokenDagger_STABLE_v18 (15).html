/* Container for the death options buttons */
#deathOptions {
  display: grid;
  grid-gap: 1rem;
  grid-template-columns: repeat(1, 1fr);
  justify-items: center;
  align-items: center;
  padding: 1rem;
}

/* Base styles for both buttons */

  font-family: 'Roboto', sans-serif;
  font-size: 3rem;

  border-radius: 10px;

/* Specific styles */
/* Remove default button styling */
#respawnBtn {
  background: none;
  border: none;
  padding: 0;
  margin: 0.5rem;
  font-size: 2rem;
  font-weight: bold;
  color: #fff;
  cursor: pointer;
  outline: none;
width: 100%;
}

/* Make each letter inline-block so we can animate them individually */
#respawnBtn span {
  display: inline-block;
}

/* Define the wave keyframes */
@keyframes wave {
  0%, 60%, 100% {
    transform: translateY(0);
  }
  30% {
    transform: translateY(-10px);
  }
}

/* Trigger the animation on hover, active, or touch */
#respawnBtn:hover span,
#respawnBtn:active span {
  animation: wave 0.6s ease-in-out;
  animation-fill-mode: forwards;
}

/* Cascade delays for each letter */
#respawnBtn span:nth-child(1) { animation-delay: 0s; }
#respawnBtn span:nth-child(2) { animation-delay: 0.05s; }
#respawnBtn span:nth-child(3) { animation-delay: 0.1s; }
#respawnBtn span:nth-child(4) { animation-delay: 0.15s; }
#respawnBtn span:nth-child(5) { animation-delay: 0.2s; }
#respawnBtn span:nth-child(6) { animation-delay: 0.25s; }
#respawnBtn span:nth-child(7) { animation-delay: 0.3s; }

#viewMenuBtn {

  box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
 z-index: 5000;

}

/* Hover effects for both buttons */
#deathOptions button:hover {
  transform: scale(1.05);
  box-shadow: 0 6px 8px rgba(0, 0, 0, 0.4);
}

/* Mobile responsiveness: on small screens, stack buttons in a single column and increase size */
@media (max-width: 600px) {

    height: 32px;   /* same as tileMap.tileHeight */
    background: rgba(255,255,255,0.7);

    /* Default no rotation (for "up") */
    transform: rotate(0deg);
    opacity: 0.5;
    transition: opacity 0.2s;
  }
  /* Rotate for each direction */
  #move-right { transform: rotate(0deg); }
  #move-down  { transform: rotate(0deg); }
  #move-left  { transform: rotate(0deg); }

    /* --- Headbutt Effect Styling --- */
     
/* Container that will always be positioned at the player's center */
#daggerContainer {

  position: absolute;
  pointer-events: none;     
      height: 0px;
   transform: translate(10%, -10%) scaleX(-1) scaleY(-1);
}

#headbuttEffect {
  left: 50px;
  font-size: 20px;
  line-height: 20px;
  text-align: center;
  transform-origin: 118% 0%; /* keep the original pivot */
  transform: rotate(90deg) translate(0, 0);
  opacity: 0;
}

#headbuttEffect.active {
  /* Run two animations simultaneously:
     - headbuttPivot moves/scales the dagger.
     - trailShadow animates a drop-shadow that appears as a trailing blur.
  */
  animation: headbuttPivot 0.2s ease-out forwards, 
             trailShadow 0.2s ease-out forwards;
}

@keyframes headbuttPivot {
  0% {
    transform: rotate(-20deg) translate(0, 0);
    opacity: 1;
  }
  /* Slightly extend out while keeping close to the pivot */
  20% {
    transform: rotate(90deg) translate(3px, -3px);
    opacity: 1;
  }
  /* Rotate slightly past the final rotation */
  50% {
    transform: rotate(calc(var(--rotation, 0deg) + 15deg)) translate(5px, -5px);
    opacity: 1;
  }
  /* Swing back to the final rotation with the same slight offset */
  70% {
    transform: rotate(var(--rotation, 0deg)) translate(3px, -3px);
    opacity: 1;
  }
  /* Swiftly scale down and fade out */
  100% {
    transform: rotate(var(--rotation, 0deg)) translate(3px, -3px) scale(0);
    opacity: 0;
  }
}

@keyframes trailShadow {
  0% {
    filter: drop-shadow(0px 0px 0px lightblue);
  }
  20% {
    filter: drop-shadow(calc(1px * var(--z,1)) calc(-1px * var(--z,1)) 1px lightblue);
  }
  50% {
    filter: drop-shadow(calc(5px * var(--z,1)) calc(-45px * var(--z,1)) 5px lightblue);
  }
  70% {
    filter: drop-shadow(calc(2px * var(--z,1)) calc(-35px * var(--z,1)) 2px lightblue);
  }
  100% {
    filter: drop-shadow(calc(1px * var(--z,1)) calc(-8px * var(--z,1)) 2px lightblue);
  }
}

.marquee {
  width: 100%;

  white-space: nowrap;
  position: relative;
}

/* Force the inner span to start offscreen and animate */
.marquee span {
  display: inline-block;
  /* Add padding so the text always moves from right offscreen to left offscreen */
  padding-left: 100%;
  animation: marquee 10s linear infinite;
}

  0% {
    transform: translateX(0);
  }
  100% {

}

function playSFX(sound, cooldownOverride) {
  const now = performance.now();
  const cd = cooldownOverride || SFX_COOLDOWNS[sound] || 100;

  if (soundCooldowns[sound] && now - soundCooldowns[sound] < cd) return;
  soundCooldowns[sound] = now;

  const pool = sfx[sound];
  if (!pool) return;

  // Round-robin through pool instead of scanning for paused element
  if (_sfxPoolIdx[sound] === undefined) _sfxPoolIdx[sound] = 0;
  const audio = pool[_sfxPoolIdx[sound]];
  _sfxPoolIdx[sound] = (_sfxPoolIdx[sound] + 1) % pool.length;

  audio.currentTime = 0;
  audio.volume = SFX_VOLUMES[sound] || 1.0;
  audio.play().catch(() => {}); // silently ignore autoplay blocks
}

    points -= tax;
    runStats.totalPoints = Math.max(0, runStats.totalPoints - tax);
  }

  waveBetween = true;

  respawnWave = true;
  waveKillsNeeded = waveKillsForWave(waveNumber + 1);

  // Reset run stats for the new attempt
  runStats.startTime = Date.now();
  runStats.bestCombo = 0;
  runStats.totalPoints = 0;

  // Reset UI
  document.getElementById("upgradeMenu").style.display = "none";
  document.getElementById("upgradeButton").style.display = "block";

  if (_sgEl) _sgEl.remove();

  // Realm state — stay in current world on death (not sanctuary)
  if (currentRealm === "sanctuary") {
    // Died while in sanctuary somehow — return to last combat world
    currentRealm = _lastCombatZoneId || "khem";
    _activeMap = combatMap;
    player.tileMap = combatMap;
  }

// Helper to return a random number between min and max.
function randomBetween(min, max) {
  return Math.random() * (max - min) + min;
}

// ---------- WEATHER SYSTEM ----------

// Possible states: "sunshine", "rain", "fog", "thunderstorm"
let weatherState = "sunshine";
let weatherTimer = randomBetween(270, 450);

// Transition blending
let prevWeatherState = "sunshine";
let weatherTransitionT = 1.0;       // 1.0 = fully in new state, counts up from 0
const WEATHER_TRANSITION_DUR = 4.0; // seconds to crossfade

// Thunder state (module-level so it persists across frames)
let lightningTimer = randomBetween(5, 10);
let thunderTintAlpha = 0;
const THUNDER_FADE_RATE = 2.0;  // alpha units per second (builds up fast)
const THUNDER_MAX_ALPHA = 0.35;

// Single reusable lightning flash element
const lightningFlashEl = document.createElement("div");
lightningFlashEl.style.cssText = "position:fixed;top:0;left:0;width:100vw;height:100vh;background:white;opacity:0;pointer-events:none;z-index:99999;transition:opacity 0.15s ease-out";
document.body.appendChild(lightningFlashEl);
let lightningFlashTimeout = null;

function triggerLightningFlash() {
  if (lightningFlashTimeout) clearTimeout(lightningFlashTimeout);
  lightningFlashEl.style.transition = "none";
  lightningFlashEl.style.opacity = "0.85";
  lightningFlashTimeout = setTimeout(() => {
    lightningFlashEl.style.transition = "opacity 0.2s ease-out";
    lightningFlashEl.style.opacity = "0";
  }, 60);
}

function pickNewWeatherState() {
  // Use current world's weather bias if available
  const _cw = typeof discoveredWorlds !== "undefined"
    ? discoveredWorlds.find(w => w.id === (typeof currentRealm !== "undefined" ? currentRealm : "khem"))
    : null;
  const bias = _cw && _cw.weatherBias
    ? _cw.weatherBias
    : { sunshine:0.7, rain:0.1, fog:0.1, thunderstorm:0.1 };
  const r = Math.random();
  let acc = 0;
  for (const [state, prob] of Object.entries(bias)) {
    acc += prob;
    if (r < acc) return state;
  }
  return "sunshine";
}

function updateWeather(deltaTime) {
  // Advance transition
  if (weatherTransitionT < 1.0) {
    weatherTransitionT = Math.min(weatherTransitionT + deltaTime / WEATHER_TRANSITION_DUR, 1.0);
  }

  // Timer: switch state
  weatherTimer -= deltaTime;
  if (weatherTimer <= 0) {
    const next = pickNewWeatherState();
    if (next !== weatherState) {
      prevWeatherState = weatherState;
      weatherTransitionT = 0.0;
    }
    weatherState = next;
    weatherTimer = randomBetween(270, 450);
  }

  // Thunder tint accumulation (only when fully in thunderstorm)
  if (weatherState === "thunderstorm") {
    lightningTimer -= deltaTime;
    thunderTintAlpha = Math.min(thunderTintAlpha + deltaTime * THUNDER_FADE_RATE, THUNDER_MAX_ALPHA);
    if (lightningTimer <= 0) {
      triggerLightningFlash();
      lightningTimer = randomBetween(5, 10);
      thunderTintAlpha = 0;
    }
  } else {
    // Decay tint when not in thunderstorm
    thunderTintAlpha = Math.max(thunderTintAlpha - deltaTime * THUNDER_FADE_RATE, 0);
  }
}

// Draw a single weather overlay given a state name and alpha multiplier
function _drawWeatherOverlay(ctx, state, alpha) {
  if (alpha <= 0) return;
  ctx.save();

  if (state === "sunshine") {
    const cx = canvas.width / 2, cy = canvas.height / 2;
    const r = Math.min(canvas.width, canvas.height) * 0.4;
    const angle = globalTime * 0.0175;
    const sunX = cx + r * Math.cos(angle);
    const sunY = cy + r * Math.sin(angle);
    const intensity = ((Math.sin(globalTime * 0.0175) + 1) / 2) * alpha;
    const grad = ctx.createRadialGradient(sunX, sunY, 0, sunX, sunY, canvas.width);
    grad.addColorStop(0, `rgba(255,255,200,${0.3 * intensity})`);
    grad.addColorStop(1, "rgba(255,255,200,0)");
    ctx.globalCompositeOperation = "lighter";
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

  } else if (state === "fog") {
    ctx.fillStyle = `rgba(200,200,200,${0.35 * alpha})`;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

  } else if (state === "rain") {
    ctx.fillStyle = `rgba(0,0,80,${0.12 * alpha})`;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

  } else if (state === "thunderstorm") {
    // Base dark tint
    ctx.fillStyle = `rgba(0,0,50,${0.35 * alpha})`;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    // Animated thunder tint on top
    if (thunderTintAlpha > 0) {
      ctx.fillStyle = `rgba(0,0,80,${thunderTintAlpha * alpha})`;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    }
  }

  ctx.restore();
}

function renderWeather(ctx) {
  const t = weatherTransitionT;
  if (t < 1.0) {
    // Crossfade: fade out previous, fade in new
    _drawWeatherOverlay(ctx, prevWeatherState, 1.0 - t);
    _drawWeatherOverlay(ctx, weatherState, t);
  } else {
    _drawWeatherOverlay(ctx, weatherState, 1.0);
  }
}

    class Vector2 {
      constructor(x, y) { this.x = x; this.y = y; }
      add(v) { return new Vector2(this.x + v.x, this.y + v.y); }
      subtract(v) { return new Vector2(this.x - v.x, this.y - v.y); }
      scale(s) { return new Vector2(this.x * s, this.y * s); }
      length() { return Math.sqrt(this.x * this.x + this.y * this.y); }
      normalize() { let len = this.length(); return new Vector2(this.x / (len || 1), this.y / (len || 1)); }
    }

        // Returns position relative to screen center, without zoom applied
        // Zoom is handled by ctx.scale() in the render loop
        return new Vector2(
          (worldPos.x - this.position.x) + this.screenWidth / 2,
          (worldPos.y - this.position.y) + this.screenHeight / 2
        );
      }
      screenToWorld(screenPos) {
        return new Vector2(
          (screenPos.x - this.screenWidth / 2) + this.position.x,

        );

    }

    class TileMap {
      constructor(width, height, tileWidth, tileHeight, realmId) {
        this.width = width;
        this.height = height;
        this.tileWidth = tileWidth;
        this.tileHeight = tileHeight;
        this.realmId = realmId || "default";
        this.tiles = [];
        const pal = REALM_PALETTES[this.realmId] || REALM_PALETTES.default;

        if (this.realmId === "sanctuary") {
          this._generateSanctuary(pal);
        } else {
          this._generateNoise(pal);
        }
      }

      _generateNoise(pal) {
        const simplex = new SimplexNoise();
        for (let y = 0; y < this.height; y++) {
          let row = [];
          for (let x = 0; x < this.width; x++) {
            let noiseValue = simplex.noise2D(x / 100, y / 100);
            noiseValue = (noiseValue + 1) / 2;
            let tileType = 0;
            let color = pal.base;
            if (noiseValue < 0.3) { tileType = 1; color = pal.water; }
            else if (noiseValue < 0.5) { tileType = 2; color = pal.sand; }
            else if (noiseValue > 0.8) { tileType = 3; color = pal.mountain; }
            row.push(new Tile(x, y, tileType, color));
          }
          this.tiles.push(row);
        }
      }

      _generateSanctuary(pal) {
        // Hand-crafted town layout — all passable cobblestone base
        // with roads, a fountain plaza centre, and a stargate tile
        const cx = Math.floor(this.width / 2);
        const cy = Math.floor(this.height / 2);
        for (let y = 0; y < this.height; y++) {
          let row = [];
          for (let x = 0; x < this.width; x++) {
            let tileType = 0;
            let color = pal.base;
            const dx = x - cx, dy = y - cy;
            const dist = Math.sqrt(dx*dx + dy*dy);
            // Outer ring: mountain walls as border
            if (x <= 2 || y <= 2 || x >= this.width-3 || y >= this.height-3) {
              tileType = 3; color = pal.mountain;
            }
            // Cobblestone paths radiating from centre
            else if (Math.abs(dx) <= 2 || Math.abs(dy) <= 2) {
              tileType = 5; color = "#8a8070"; // cobblestone road
            }
            // Fountain plaza — inner 6-tile diamond
            else if (dist < 6) {
              tileType = 6; color = "#7a7060"; // gate plaza
            }
            // Stargate tile — exact centre
            if (x === cx && y === cy) {
              tileType = 7; color = "#4a6a9a"; // gate tile (blue-ish)
            }
            row.push(new Tile(x, y, tileType, color));
          }
          this.tiles.push(row);
        }
      }
    
      gridToWorld(gridX, gridY) {
        return new Vector2(
          (gridX - gridY) * (this.tileWidth / 2),
          (gridX + gridY) * (this.tileHeight / 2)
        );
      }
    
      render(ctx, camera) {
        const pad = 2; // extra tile buffer around visible area
        const sw = camera.screenWidth, sh = camera.screenHeight;
        // Compute which grid rows/cols are visible by inverse-projecting screen corners
        // For isometric: worldX = (screenX - sw/2 + camX), similarly Y
        // Simpler: find the player grid pos and render only nearby tiles
        const halfW = this.tileWidth / 2, halfH = this.tileHeight / 2;

        // Figure out the visible tile range by checking which tiles project onto screen
        // Isometric visibility: estimate from camera position and screen bounds
        const camWorldX = camera.position.x;
        const camWorldY = camera.position.y;
        // Inverse isometric: grid coords from world
        // worldX = (gx - gy) * tw/2  =>  gx - gy = worldX / (tw/2)
        // worldY = (gx + gy) * th/2  =>  gx + gy = worldY / (th/2)
        const visRange = Math.ceil((Math.max(sw, sh) / (Math.min(this.tileWidth, this.tileHeight) * camera.zoom))) + pad + 4;
        // Approximate center tile
        const camIsoA = camWorldX / halfW; // gx - gy
        const camIsoB = camWorldY / halfH; // gx + gy
        const centerGX = Math.round((camIsoA + camIsoB) / 2);
        const centerGY = Math.round((camIsoB - camIsoA) / 2);

        const minY = Math.max(0, centerGY - visRange);
        const maxY = Math.min(this.height - 1, centerGY + visRange);
        const minX = Math.max(0, centerGX - visRange);
        const maxX = Math.min(this.width - 1, centerGX + visRange);

        for (let y = minY; y <= maxY; y++) {
          for (let x = minX; x <= maxX; x++) {
            let worldPos = this.gridToWorld(x, y);
            let screenPos = camera.worldToScreen(worldPos);
            // Secondary cull: skip if clearly off-screen even after range estimate
            if (screenPos.x + this.tileWidth < -sw * 0.1 || screenPos.x > sw * 1.1 ||
                screenPos.y + this.tileHeight < -sh * 0.1 || screenPos.y > sh * 1.1) continue;
            ctx.beginPath();
            ctx.moveTo(screenPos.x, screenPos.y + halfH);
            ctx.lineTo(screenPos.x + halfW, screenPos.y);
            ctx.lineTo(screenPos.x + this.tileWidth, screenPos.y + halfH);
            ctx.lineTo(screenPos.x + halfW, screenPos.y + this.tileHeight);
            ctx.closePath();
            ctx.fillStyle = this.tiles[y][x].color;
            ctx.fill();
            ctx.strokeStyle = "rgba(0, 0, 0, 0.02)";
            ctx.stroke();
            // Safe zone wall overlay
            if (this.tiles[y][x].tileType === 4) {
              const tile = this.tiles[y][x];
              const hpRatio = tile.zoneHP / tile.zoneMaxHP;
              ctx.fillStyle = `rgba(80,180,255,${0.55 + 0.35 * hpRatio})`;
              ctx.fill();
              ctx.strokeStyle = `rgba(0,120,255,0.9)`;
              ctx.lineWidth = 2;
              ctx.stroke();
              ctx.lineWidth = 1;
            }
          }
        }
      }
    }

function isTilePassable(tile) {

    function renderNukeFlash(ctx) {
      if (!nukeFlash) return;
      // Timer is decremented in the game loop
      const t = nukeFlash.timer;
      const d = nukeFlash.duration;
      const progress = 1 - (t / d); // 0 at start, 1 at end
      const alpha = Math.pow(1 - progress, 0.4); // fast fade in, slow fade out

      const cx = canvas.width / 2, cy = canvas.height / 2;
      const maxR = Math.sqrt(cx*cx + cy*cy) * 1.4;

      ctx.save();

      // Full screen neon wash — cycles blue→green→white
      const hue = 160 + progress * 80; // 160=cyan-green, 240=blue
      const washAlpha = alpha * 0.55;
      ctx.fillStyle = `hsla(${hue}, 100%, 70%, ${washAlpha})`;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Three expanding rings at different phases
      [0, 0.15, 0.3].forEach((offset, i) => {
        const rProgress = Math.min(1, (progress - offset) * 2.5);
        if (rProgress <= 0) return;
        const r = rProgress * maxR;
        const ringAlpha = (1 - rProgress) * alpha * 0.9;
        const colors = ["#00ffff", "#00ff88", "#ffffff"];
        ctx.beginPath();
        ctx.arc(cx, cy, r, 0, Math.PI * 2);
        ctx.strokeStyle = colors[i];
        ctx.lineWidth = 6 * (1 - rProgress) + 2;
        ctx.globalAlpha = ringAlpha;
        ctx.shadowBlur = 30;
        ctx.shadowColor = colors[i];
        ctx.stroke();
      });

      // Central burst — bright white core that fades
      const burstAlpha = Math.max(0, 1 - progress * 3) * alpha;
      if (burstAlpha > 0) {
        const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, 200 * (1 + progress));
        grad.addColorStop(0, `rgba(255,255,255,${burstAlpha})`);
        grad.addColorStop(0.3, `rgba(100,255,200,${burstAlpha * 0.6})`);
        grad.addColorStop(1, `rgba(0,255,150,0)`);
        ctx.globalAlpha = 1;
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(cx, cy, 200 * (1 + progress * 2), 0, Math.PI * 2);
        ctx.fill();
      }

      ctx.restore();
    }

    function renderMegaBombCountdown(ctx) {

      ctx.save();

      ctx.globalAlpha = Math.min(1, t);

    function updateCombo(deltaTime) {
      if (comboCount > 0) {
        comboTimer -= deltaTime;
        if (comboTimer <= 0) {
          // Award bonus points for high combos on expiry
          if (comboCount >= 5) {
            const bonus = Math.floor(comboCount * 2);
            points += bonus;
            runStats.totalPoints += bonus;
            document.getElementById("pointsDisplay").textContent = Math.floor(points);
          }
          comboCount = 0; comboTimer = 0;
        }
        if (player._lifesteal) player.hp = Math.min(player.maxHP, player.hp + 0.5 * deltaTime);
      }
      // Momentum stacks decay when no kills for 4s
      if (player._momentum && player._momentumTimer > 0) {
        player._momentumTimer -= deltaTime;
        if (player._momentumTimer <= 0) { player._momentumStacks = 0; }
      }
    }

    function damageEnemy(enemy, amount = 10) {
      if (!enemy.alive || enemy.deathTimer !== undefined) return;
      // Berserker: double damage below 30 HP
      if (player._berserker && player.hp < 30) amount = Math.floor(amount * 2);
      // Momentum: +5% per stack (max 50%)
      if (player._momentum && player._momentumStacks > 0) amount = Math.floor(amount * (1 + player._momentumStacks * 0.05));
      // Glass Cannon: double damage
      if (player._glassCannon) amount = Math.floor(amount * 2);
      // Bosses take modestly boosted damage (1.5x) — they have high HP to compensate
      const actual = enemy._type === "boss" ? Math.floor(amount * 1.5) : amount;
      enemy.hp -= actual;
      enemy.damageFlashTimer = 0.35;
      enemy.damageVibrateTimer = 0.35;

      // Knockback away from player
      const dx = (enemy.position.x + enemy.width/2) - (player.position.x + player.width/2);
      const dy = (enemy.position.y + enemy.height/2) - (player.position.y + player.height/2);
      const dist = Math.sqrt(dx*dx + dy*dy) || 1;
      const kbForce = enemy._type === "tank" ? 6 : enemy._type === "boss" ? 4 : 14;
      enemy.knockback = new Vector2((dx/dist)*kbForce, (dy/dist)*kbForce);

      // Hit-stop — subtle slow-motion dip (only if not already active to prevent compounding)
      if (hitStopTimer <= 0) hitStopTimer = enemy._type === "boss" ? 0.04 : 0.02;

      // Screen shake on hit
      screenShakeTime = enemy._type === "boss" ? 0.15 : 0.08;
      screenShakeMagnitude = enemy._type === "boss" ? 6 : 3;

      // Impact flash at enemy center
      spawnImpactFlash(enemy.position.x + enemy.width/2, enemy.position.y + enemy.height/2);

      // Floating damage number
      spawnDamageNumber(enemy.position.x + enemy.width/2, enemy.position.y, actual);

      if (enemy.hp <= 0) {
        enemy.deathTimer = 0.3;
        // Volatile curse: chain explosion on death
        if (enemy._volatile) {
          const capturedPos = { x: enemy.position.x + enemy.width/2, y: enemy.position.y + enemy.height/2 };
          setTimeout(() => {
            spawnEnemyExplosionEffect(new Vector2(capturedPos.x, capturedPos.y));
            playSFX("explosion");
            enemies.forEach(e => {
              if (!e.alive || e.deathTimer !== undefined) return;
              const ex = e.position.x + e.width/2;
              const ey = e.position.y + e.height/2;
              if (Math.sqrt((ex-capturedPos.x)**2+(ey-capturedPos.y)**2) < 80) damageEnemy(e, 20);
            });
          }, 320);
        }
      }
    }

    function resolveCollision(entityA, entityB) {
      let ax = entityA.position.x + entityA.knockback.x,
          ay = entityA.position.y + entityA.knockback.y,
          aw = entityA.width, ah = entityA.height;
      let bx = entityB.position.x + entityB.knockback.x,
          by = entityB.position.y + entityB.knockback.y,
          bw = entityB.width, bh = entityB.height;
      if (ax < bx + bw && ax + aw > bx && ay < by + bh && ay + ah > by) {
        let centerA = new Vector2(ax + aw/2, ay + ah/2);
        let centerB = new Vector2(bx + bw/2, by + bh/2);
        let diff = centerA.subtract(centerB);
        let distance = diff.length();
        if (distance === 0) { diff = new Vector2(1,0); distance = 1; }
        let minDistance = (aw+bw)/4;
        let overlap = minDistance - distance;
        if (overlap > 0) {
          let knock = diff.normalize().scale(overlap*0.5);
          entityA.knockback = entityA.knockback.add(knock);
          entityB.knockback = entityB.knockback.subtract(knock);
        }
      }
    }

    async function loadGame() {
      if (!window.storage) return;
      try {
        const result = await window.storage.get("brokenDagger_save");
        if (!result) return;
        const data = JSON.parse(result.value);

        // Restore discovered worlds (skip khem — already in array)
        if (data.discoveredWorlds) {
          data.discoveredWorlds.forEach(w => {
            if (w.id === "khem") {
              // Update khem fields
              const k = discoveredWorlds[0];
              k.highestWave = w.highestWave || 0;
              k.gateOpened  = w.gateOpened  || false;
            } else if (!discoveredWorlds.find(d => d.id === w.id)) {
              discoveredWorlds.push(w);
            }
          });
        }

        // Restore carried items
        if (data.carriedItems) {
          carriedItems = data.carriedItems
            .map(c => SANCTUARY_ITEMS[c.id] ? { id: c.id, def: SANCTUARY_ITEMS[c.id] } : null)
            .filter(Boolean);
        }

        // Restore placed items
        if (data.sanctuaryPlaced) {
          sanctuaryPlaced = data.sanctuaryPlaced
            .map(p => SANCTUARY_ITEMS[p.id] ? { id: p.id, tileX: p.tileX, tileY: p.tileY, def: SANCTUARY_ITEMS[p.id] } : null)

    function tryDropSanctuaryItem(worldId, isBossKill, waveNum, isOverworld) {
      if (currentRealm === "sanctuary") return;
      // Enforce minimum kill gap between drops
      _itemDropKillsSince++;
      if (!isBossKill && _itemDropKillsSince < ITEM_DROP_MIN_KILLS) return;
      // Cap drops per world visit
      if (_itemDropsThisWorld >= ITEM_DROP_MAX_PER_RUN) return;

      const eligible = Object.values(SANCTUARY_ITEMS).filter(item => {
        if (carriedItems.some(c => c.id === item.id)) return false;
        if (sanctuaryPlaced.some(p => p.def.id === item.id)) return false;
        if (item.worlds.includes("boss") && !isBossKill) return false;
        if (item.worlds.includes("wave5") && waveNum < 5) return false;
        if (item.worlds.includes("khem") && worldId !== "khem") return false;
        if (item.worlds.includes("newworld") && discoveredWorlds.length < 2) return false;
        if (item.worlds.includes("multiworld") && discoveredWorlds.length < 3) return false;
        return true;
      });
      if (eligible.length === 0) return;
      // One item, one roll — pick randomly from eligible pool
      const item = eligible[Math.floor(Math.random() * eligible.length)];
      if (Math.random() > item.rarity) return;

      carriedItems.push({ id: item.id, def: item });
      _itemDropKillsSince = 0; // reset gap counter
      _itemDropsThisWorld++;
      showUpgradeAlert(item.icon + " " + item.name + " found! Place it in Sanctuary.");
      saveGame();

    // ── Discovered worlds ────────────────────────────────────────

    // Local wave = waveNumber - _worldWaveOffset + 1

    // ── Procedural world name generator ─────────────────────────
    // Deterministic from a seed so the same world always has the same name.
    function _genWorldName(seed) {
      // Simple LCG — gives consistent output for a given seed
      let s = seed >>> 0;
      const rng = () => { s = (s * 1664525 + 1013904223) >>> 0; return s / 4294967296; };

      const pre  = ["Aer","Aeth","Ald","Ark","Bel","Cael","Cor","Dal","Dor","Eld",
                    "Eth","Fal","Gal","Gor","Hael","Ilm","Ior","Kel","Kor","Lyth",
                    "Mael","Nar","Ond","Orn","Peth","Qal","Rav","Sol","Thal","Ulm",
                    "Var","Vel","Weth","Xar","Yel","Zel"];
      const mid  = ["a","ae","ei","o","on","ar","eth","ith","ael","aan",
                    "oth","ul","en","an","or","ir","es","ash","ell","urn"];
      const suf  = ["","","","ix","ax","un","on","el","ar","is",
                    "ath","oth","ek","ak","an","in","us","om","em","yr"];
      const p = pre[Math.floor(rng() * pre.length)];
      const m = mid[Math.floor(rng() * mid.length)];
      const sf = suf[Math.floor(rng() * suf.length)];
      const n = Math.floor(rng() * 99) + 1;
      return p + m + sf + "-" + n;
    }

    // World archetypes — each index matches its world_N palette
    const WORLD_ARCHETYPES = [

      { icon:"💜", subs:["Arcane resonance extreme","Gate logic unstable","Reality index: low","Void lattice detected"],

        weatherBias:{ sunshine:0.1, rain:0.05, fog:0.55, thunderstorm:0.3 } },
      { icon:"🌊", subs:["Submerged ruins detected","Ice shelf unstable","Saline atmosphere","Tidal anomaly present"],
        weatherBias:{ sunshine:0.15, rain:0.4, fog:0.35, thunderstorm:0.1 } },
      { icon:"🟡", subs:["Ancient settlement buried","No moisture detected","Sand compression extreme","Solar exposure critical"],
        weatherBias:{ sunshine:0.7, rain:0.05, fog:0.15, thunderstorm:0.1 } },

        weatherBias:{ sunshine:0.05, rain:0.15, fog:0.2, thunderstorm:0.6 } },

    // Generate a new world and push to discoveredWorlds
    function _discoverNewWorld() {
      const seed = Date.now() ^ (Math.random() * 0xFFFFFFFF | 0);
      const name = _genWorldName(seed);
      const _wIdx = discoveredWorlds.length % 8;
      const arch = WORLD_ARCHETYPES[_wIdx];
      const sub = arch.subs[Math.floor(Math.random() * arch.subs.length)];
      const world = {
        id: "world_" + seed,
        name: name,
        icon: arch.icon,
        sub: sub,
        waveOnArrival: waveNumber,
        paletteKey: "world_" + _wIdx,
        weatherBias: arch.weatherBias,
        highestWave: 0,
        gateOpened: false
      };
      discoveredWorlds.push(world);
      saveGame();
      return world;
    }

    // Travel to a world — resets wave counter, swaps realm state
    function travelToWorld(world) {
      const _lingering = document.getElementById("narrativeCard");
      if (_lingering) _lingering.remove();
      // Freeze all world systems immediately — stops old wave running during fade
      realmPhase = "cutscene";
      waveBetween = false;
      enemies.length = 0;
      bullets.length = 0;
      // Clear gate interaction state
      _zonePendingPrompt = false;
      _zonePendingId = null;
      _zonePendingTimer = 0;
      gateOnMap = false;
      _itemDropsThisWorld = 0; // reset drop cap for new world
      _itemDropKillsSince = 0;
      timeScale = 1.0;
      // Iris wipe in the destination world's background colour
      const _twColor = (REALM_PALETTES[world.paletteKey] || REALM_PALETTES.default).bg || "#000000";
      _realmFadeColor = _twColor; _realmFadeStyle = "iris";
      realmFadeTo(() => {
        // Reset wave counter for this world
        const prevWave = waveNumber;
        waveNumber = 1;
        _worldWaveOffset = 0;
        bossWaveIndex = 0;
        waveKillsThisWave = 0;
        bossKillsThisWave = 0;
        waveStartKillCount = killCount;
        waveKillsNeeded = waveKillsForWave(1);

        // Reset gate — must collect gems again in new world
        // Remove old gate tile from map first
        if (gateOnMap) {
          const _gm = _activeMap || tileMap;
          if (_gm.tiles[gateTileY] && _gm.tiles[gateTileY][gateTileX]) {
            _gm.tiles[gateTileY][gateTileX].tileType = 0;
            _gm.tiles[gateTileY][gateTileX].color = _gm._pal ? _gm._pal.base : "#5a7a3a";
          }
        }
        gateOnMap = false;
        gemXP = 0;
        gateTileX = 0; gateTileY = 0;

        // Use cached map if world visited before, else generate and cache
        const _palKey = world.paletteKey || "world_0";
        if (!_worldMaps[world.id]) {
          _worldMaps[world.id] = new TileMap(CONFIG.MAP_WIDTH, CONFIG.MAP_HEIGHT, CONFIG.TILE_WIDTH, CONFIG.TILE_HEIGHT, _palKey);
        }
        combatMap = _worldMaps[world.id];
        // Set realm state — use cutscene so nothing runs until card dismissed
        currentRealm = world.id;
        currentZoneId = world.id;
        realmPhase = "cutscene";
        _activeMap = combatMap;
        player.tileMap = combatMap;

        // Spawn near edge, not centre
        let sx = 5, sy = 5;
        for (let attempt = 0; attempt < 20; attempt++) {
          const gx = 3 + Math.floor(Math.random() * (combatMap.width - 6));
          const gy = 3 + Math.floor(Math.random() * (combatMap.height - 6));
          if (isTilePassable(combatMap.tiles[gy][gx])) { sx = gx; sy = gy; break; }
        }
        player.gridX = sx; player.gridY = sy;
        player.position = combatMap.gridToWorld(sx, sy);
        player.targetGridX = sx; player.targetGridY = sy;
        player.moving = false;
        enemies.length = 0; bullets.length = 0; baitBombs.length = 0;
        _lastCombatGridX = sx; _lastCombatGridY = sy;

        showNarrativeCard({
          icon: world.icon,
          title: world.name,
          text: world.sub + ". The gate closes behind you. Whatever is here — " +
                "it does not know you yet. Wave 1 begins.",
          onDismiss: () => {
            // Reset any lingering weather then apply world bias
            weatherState = "sunshine"; thunderTintAlpha = 0;
            const _arrWorld = discoveredWorlds.find(w => w.id === currentRealm);
            if (_arrWorld && _arrWorld.weatherBias) {
              const wb = _arrWorld.weatherBias;
              const r = Math.random();
              let acc = 0;
              for (const [state, prob] of Object.entries(wb)) {
                acc += prob;
                if (r < acc) { weatherState = state; break; }
              }
              weatherTimer = randomBetween(120, 240); // shorter cycles in new worlds
            }
            // Switch to combat and start wave 1 fresh
            realmPhase = "combat";
            waveNumber = 0; // _updateIntermission will do waveNumber++ → 1
            bossWaveIndex = 0;
            waveKillsThisWave = 0;
            bossKillsThisWave = 0;
            waveStartKillCount = killCount;
            waveKillsNeeded = waveKillsForWave(1);
            waveBetween = true;
            waveBetweenTimer = 2.0;
            respawnWave = false;
          }
        });
      });
    }

    const tileMap = new TileMap(CONFIG.MAP_WIDTH, CONFIG.MAP_HEIGHT, CONFIG.TILE_WIDTH, CONFIG.TILE_HEIGHT, "default");
    combatMap = tileMap;

    // ══════════════════════════════════════════════════════════════
    // ZONE SYSTEM — Realm zones define pacing, goals, and narrative
    // ══════════════════════════════════════════════════════════════
    //
    // Each zone has:
    //   id          — unique string
    //   realm       — which realm map it lives in
    //   type        — "hub" | "combat" | "overworld"
    //   goal        — { type: "wavesCleared"|"bossKilled"|"always", count }
    //   unlocks     — zone ids that become accessible on goal met
    //   glyph       — true if completing this gives a gate glyph
    //   onEnter     — narrative card to show on zone enter
    //   onComplete  — narrative card to show on goal met
    //   gridRegion  — { x, y, w, h } tile region that belongs to this zone
    //                 null = entire map (default for first zone)

    // ── Realms — top-level destinations reachable via the gate ───
    // Simple two-realm system: sanctuary (hub) and khem (combat).
    // More realms added later via unlockZone().
    const REALM_ZONES = {
      "sanctuary": { id: "sanctuary", realm: "sanctuary", type: "hub" },
      "khem": {
        id: "khem", realm: "khem", type: "combat",
        onEnter: { icon: "⚱️", title: "Khem — the black land",
          text: "The gate delivers you back to the black sand. " +
                "The shades have not rested. Neither will you." }
      },
    };

    let _unlockedZones = new Set(["khem", "sanctuary"]);
    function isZoneUnlocked(id) { return _unlockedZones.has(id); }
    function unlockZone(id) {
      if (_unlockedZones.has(id)) return;
      _unlockedZones.add(id);
      showUpgradeAlert("🌀 New realm accessible: " + id);
    }

    // enterZone — sets phase and fires narrative
    function enterZone(id) {
      const zone = REALM_ZONES[id];
      if (!zone) return;
      currentZoneId = id;
      zoneWavesCleared = 0;
      zoneGoalMet = false;
      _zonePendingPrompt = false;
      _zonePendingId = null;
      if (zone.type === "hub") {
        realmPhase = "hub";
        enemies.length = 0; bullets.length = 0; baitBombs.length = 0;
      } else if (zone.type === "combat") {
        realmPhase = "combat";
        enemies.length = 0; bullets.length = 0;
        waveBetween = true; waveBetweenTimer = 2.0;
      } else if (zone.type === "overworld") {
        realmPhase = "overworld";
        enemies.length = 0; bullets.length = 0;
      }
      if (zone.onEnter) setTimeout(() => showNarrativeCard(zone.onEnter), 500);
    }

    // Stubs — kept for future expansion
    function completeZone() {}
    function checkZoneGoal() {}


    // ── Gem-gate system ──────────────────────────────────────────
    function checkGemGateThreshold() {
      if (gateOnMap || currentRealm === "sanctuary" || realmPhase === "hub") return;
      const _effectiveGateCost = Math.max(50, GEM_GATE_COST - (player._gemGateDiscount || 0));
      if (gemXP < _effectiveGateCost) return;
      gateOnMap = true;
      sanctuaryUnlocked = true;
      // Mark this world's gate as opened
      const _gw = discoveredWorlds.find(w => w.id === currentRealm);
      if (_gw) { _gw.gateOpened = true; saveGame(); }
      // Place gate tile near centre of combat map, clear of edges
      const _map = _activeMap || tileMap;
      const cx = Math.floor(_map.width / 2);
      const cy = Math.floor(_map.height / 2);
      // Find a passable tile near centre
      let placed = false;
      for (let r = 2; r < 10 && !placed; r++) {
        for (let angle = 0; angle < 8 && !placed; angle++) {
          const a = (angle / 8) * Math.PI * 2;
          const gx = Math.round(cx + Math.cos(a) * r);
          const gy = Math.round(cy + Math.sin(a) * r);
          if (gx < 3 || gy < 3 || gx >= _map.width-3 || gy >= _map.height-3) continue;
          if (!isTilePassable(_map.tiles[gy][gx])) continue;
          gateTileX = gx; gateTileY = gy;
          _map.tiles[gy][gx].tileType = 7;
          _map.tiles[gy][gx].color = "#4a6a9a";
          placed = true;
        }
      }
      // Non-blocking notification — no narrative card that freezes timeScale
      showUpgradeAlert("🌀 150 gems reached — a gate has opened on the map!");
      // Brief screen flash to signal the event
      screenFlashAlpha = Math.min(1, screenFlashAlpha + 0.4);
    }

    function checkGateInteraction() {
      if (!gateOnMap || currentRealm === "sanctuary") return;
      const dist = Math.abs(player.gridX - gateTileX) + Math.abs(player.gridY - gateTileY);
      if (dist <= 2) {
        if (_zonePendingId !== "gate") {
          _zonePendingId = "gate";
          _zonePendingTimer = 0;
          _zonePendingPrompt = true;
        }
        // Timer is incremented in game loop via checkGateInteractionTick
        if (_zonePendingTimer >= 1.5) showStargateOverlay();
      } else if (_zonePendingId === "gate") {
        _zonePendingPrompt = false;
        _zonePendingId = null;
        _zonePendingTimer = 0;
      }
    }

    function renderGateTile(ctx, camera) {
      if (!gateOnMap || currentRealm === "sanctuary") return;
      const _map = _activeMap || tileMap;
      const wp = _map.gridToWorld(gateTileX, gateTileY);
      const sp = camera.worldToScreen(wp);
      const pulse = 0.5 + 0.5 * Math.sin(globalTime * 3);
      const hw = _map.tileWidth / 2, hh = _map.tileHeight / 2;
      // Glowing chevron ring above the gate tile
      ctx.save();
      ctx.shadowBlur = 20 + 10 * pulse;
      ctx.shadowColor = "rgba(100,160,255,0.9)";
      ctx.strokeStyle = "rgba(120,180,255," + (0.6 + 0.4*pulse).toFixed(2) + ")";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(sp.x + hw, sp.y - 10 - 8*pulse);
      ctx.lineTo(sp.x + _map.tileWidth, sp.y + hh - 10 - 8*pulse);
      ctx.lineTo(sp.x + hw, sp.y + _map.tileHeight - 10 - 8*pulse);
      ctx.lineTo(sp.x, sp.y + hh - 10 - 8*pulse);
      ctx.closePath();
      ctx.stroke();
      ctx.shadowBlur = 0;
      // Label
      const dist = Math.abs(player.gridX - gateTileX) + Math.abs(player.gridY - gateTileY);
      if (dist <= 8) {
        ctx.font = "bold 12px sans-serif";
        ctx.textAlign = "center";
        ctx.fillStyle = "rgba(160,210,255," + (0.6 + 0.4*pulse).toFixed(2) + ")";
        ctx.strokeStyle = "rgba(0,0,0,0.6)"; ctx.lineWidth = 2;
        const label = dist <= 2 ? "🌀 Gate  [A / E]" : "🌀 Gate";
        ctx.strokeText(label, sp.x + hw, sp.y - 16 - 8*pulse);
        ctx.fillText(label, sp.x + hw, sp.y - 16 - 8*pulse);
      }
      ctx.restore();
    }

    // ── Sanctuary stargate tile effect ──────────────────────────
    function renderSanctuaryGateTile(ctx, camera) {
      if (currentRealm !== "sanctuary" || realmPhase !== "hub") return;
      const _map = sanctuaryMap || tileMap;
      const cx = Math.floor(CONFIG.MAP_WIDTH / 2);
      const cy = Math.floor(CONFIG.MAP_HEIGHT / 2);
      const wp = _map.gridToWorld(cx, cy);
      const sp = camera.worldToScreen(wp);
      const pulse = 0.5 + 0.5 * Math.sin(globalTime * 3);
      const hw = _map.tileWidth / 2, hh = _map.tileHeight / 2;
      // Same glowing chevron ring as the overworld gate
      ctx.save();
      ctx.shadowBlur = 20 + 10 * pulse;
      ctx.shadowColor = "rgba(100,160,255,0.9)";
      ctx.strokeStyle = "rgba(120,180,255," + (0.6 + 0.4*pulse).toFixed(2) + ")";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(sp.x + hw, sp.y - 10 - 8*pulse);
      ctx.lineTo(sp.x + _map.tileWidth, sp.y + hh - 10 - 8*pulse);
      ctx.lineTo(sp.x + hw, sp.y + _map.tileHeight - 10 - 8*pulse);
      ctx.lineTo(sp.x, sp.y + hh - 10 - 8*pulse);
      ctx.closePath();
      ctx.stroke();
      // Inner fill pulse
      ctx.fillStyle = "rgba(80,140,255," + (0.08 + 0.07*pulse).toFixed(2) + ")";
      ctx.fill();
      ctx.shadowBlur = 0;
      // Label — appears when near
      const dist = Math.abs(player.gridX - cx) + Math.abs(player.gridY - cy);
      if (dist <= 8) {
        ctx.font = "bold 12px sans-serif";
        ctx.textAlign = "center";
        ctx.fillStyle = "rgba(80,60,40," + (0.6 + 0.4*pulse).toFixed(2) + ")";
        ctx.strokeStyle = "rgba(255,255,255,0.7)"; ctx.lineWidth = 2;
        const label = dist <= 2 ? "🌀 Stargate  [A / E]" : "🌀 Stargate";
        ctx.strokeText(label, sp.x + hw, sp.y - 16 - 8*pulse);
        ctx.fillText(label,   sp.x + hw, sp.y - 16 - 8*pulse);
      }
      ctx.restore();
    }

    // ── Overworld enemy spawner ───────────────────────────────────
    // Sparse wandering enemies — not wave-based, just ambient presence
    const OW_MAX_ENEMIES = 6;
    const OW_SPAWN_INTERVAL = 8.0;
    const OW_ENEMY_TYPES = ["basic", "rusher", "ranged"]; // subset available in overworld

    function updateOverworld(effectiveDelta, deltaTime) {
      if (realmPhase !== "overworld") return;

      // Overworld uses the main enemies[] array so all existing rendering/collision works.
      // Spawn new wandering enemies slowly up to OW_MAX_ENEMIES
      _owSpawnTimer += effectiveDelta;
      const aliveCount = enemies.filter(e => e.alive).length;
      if (_owSpawnTimer >= OW_SPAWN_INTERVAL && aliveCount < OW_MAX_ENEMIES) {
        _owSpawnTimer = 0;
        const _map = _activeMap || tileMap;
        const pos = _owRandomSpawn(_map);
        if (pos) {
          const r = Math.random();
          let e;
          if (r < 0.5)       e = new Enemy(pos.x, pos.y, _map);
          else if (r < 0.72) e = new RusherEnemy(pos.x, pos.y, _map);
          else if (r < 0.88) e = new RangedEnemy(pos.x, pos.y, _map);
          else               e = new TankEnemy(pos.x, pos.y, _map);
          // Overworld enemies are weaker — 60% of base HP
          e.maxHP = Math.floor(e.maxHP * 0.6);
          e.hp = e.maxHP;
          e._overworld = true; // flag so they don't count toward wave kills
          enemies.push(e);
        }
      }

      // Check zone transition — did player walk into a combat zone?
      checkZoneTransition(deltaTime);
    }

    function _owRandomSpawn(_map) {
      // Spawn at least 12 tiles from player
      let attempts = 0;
      while (attempts++ < 20) {
        const gx = Math.floor(Math.random() * _map.width);
        const gy = Math.floor(Math.random() * _map.height);
        if (!isTilePassableForEnemy(_map.tiles[gy][gx])) continue;
        const dist = Math.abs(gx - player.gridX) + Math.abs(gy - player.gridY);
        if (dist >= 12) return { x: gx, y: gy };
      }
      return null;
    }

    // Zone transition — check if player walked into a new zone region
    function checkZoneTransition(deltaTime) {
      const px = player.gridX, py = player.gridY;
      for (const [id, zone] of Object.entries(REALM_ZONES)) {
        if (id === currentZoneId) continue;
        if (!isZoneUnlocked(id)) continue;
        if (zone.realm !== currentRealm && zone.realm !== "sanctuary") continue;
        if (!zone.gridRegion) continue;
        const r = zone.gridRegion;
        if (px >= r.x && px < r.x + r.w && py >= r.y && py < r.y + r.h) {
          // Player is standing in this zone's region
          if (zone.type === "hub") {
            // Hubs enter immediately
            enterZone(id);
            return;
          } else if (zone.type === "combat") {
            // Combat zones: show a brief prompt, auto-enter after 1.5s
            if (_zonePendingId !== id) {
              _zonePendingId = id;
              _zonePendingTimer = 0;
              _zonePendingPrompt = true;
              const z = REALM_ZONES[id];
              showUpgradeAlert("⚔️ " + (z.onEnter ? z.onEnter.title : id) + " — [A / E] to enter now");
            }
            _zonePendingTimer += deltaTime;
            if (_zonePendingTimer >= 1.5) {
              enterZone(id);
            }
            return;
          } else {
            // Overworld sub-zones just swap narrative, no phase change
            if (zone.onEnter && currentZoneId !== id) {
              currentZoneId = id;
              setTimeout(() => showNarrativeCard(zone.onEnter), 300);
            }
          }
        }
      }
      // Player left the pending zone — cancel prompt
      if (_zonePendingPrompt && _zonePendingId) {
        const r = REALM_ZONES[_zonePendingId].gridRegion;
        if (!r || px < r.x || px >= r.x + r.w || py < r.y || py >= r.y + r.h) {
          _zonePendingPrompt = false;
          _zonePendingId = null;
          _zonePendingTimer = 0;
        }
      }
    }

    // ── Realm Transition System ───────────────────────────────────
    // Fade to black → swap map + player position → fade in
    function realmFadeTo(cb, speed, color, style) {
      realmFadeDir = 1;
      realmFadeAlpha = 0;
      realmTransitioning = true;
      _realmFadeCb = cb;
      _realmFadeSpeed = speed || 1.4;
      _realmFadeColor = color || "#000000";
      _realmFadeStyle = style || "iris";
    }
    let _realmFadeSpeed = 1.2;

    function updateRealmFade(dt) {
      if (!realmTransitioning) return;
      if (realmFadeDir === 1) {
        realmFadeAlpha = Math.min(1, realmFadeAlpha + dt * _realmFadeSpeed);
        if (realmFadeAlpha >= 1 && _realmFadeCb) {
          _realmFadeCb();
          _realmFadeCb = null;
          realmFadeDir = -1;
        }
      } else if (realmFadeDir === -1) {
        realmFadeAlpha = Math.max(0, realmFadeAlpha - dt * _realmFadeSpeed);
        if (realmFadeAlpha <= 0) {
          realmTransitioning = false;
          realmFadeDir = 0;
        }
      }
    }

    function renderRealmFade(ctx, canvas) {
      if (realmFadeAlpha <= 0) return;
      ctx.save();
      const a = realmFadeAlpha;

      if (_realmFadeStyle === "iris") {
        // Isometric ground iris — spreads from player like ink on the floor
        // Same 0.55 Y squish as blood splats so it lies flat on isometric ground
        const isoY = 0.55;

        // Origin: player feet in screen space (renderRealmFade is inner-scope)
        let ox = canvas.width / 2, oy = canvas.height / 2;
        if (player && player.position && camera) {
          const _pc = new Vector2(
            player.position.x + player.width / 2,
            player.position.y + player.height  // feet, not centre
          );
          const _sp = camera.worldToScreen(_pc);
          // Account for zoom transform — worldToScreen gives pre-zoom coords
          ox = canvas.width  / 2 + (_sp.x - canvas.width  / 2) * camera.zoom;
          oy = canvas.height / 2 + (_sp.y - canvas.height / 2) * camera.zoom;
        }

        // Max radius to cover all screen corners accounting for ellipse squish
        const corners = [[0,0],[canvas.width,0],[0,canvas.height],[canvas.width,canvas.height]];
        let maxR = 0;
        corners.forEach(([cx2, cy2]) => {
          const dx = cx2 - ox, dy = (cy2 - oy) / isoY;
          maxR = Math.max(maxR, Math.sqrt(dx*dx + dy*dy));
        });
        maxR += 40;

        const r = a * maxR;

        ctx.beginPath();
        ctx.ellipse(ox, oy, r, r * isoY, 0, 0, Math.PI * 2);
        ctx.fillStyle = _realmFadeColor;
        ctx.fill();

        // Edge shimmer at the expanding rim
        if (a > 0.04 && a < 0.96) {
          ctx.beginPath();
          ctx.ellipse(ox, oy, r, r * isoY, 0, 0, Math.PI * 2);
          ctx.strokeStyle = "rgba(255,255,255," + (Math.sin(a * Math.PI) * 0.45).toFixed(2) + ")";
          ctx.lineWidth = 2.5;
          ctx.stroke();
        }

        // ── Vertical light beam + water swirl ────────────────────
        const beamPeak = Math.sin(a * Math.PI); // peaks at midpoint
        if (beamPeak > 0.02) {
          const t = globalTime;
          const bw = 60 + 30 * beamPeak; // beam width pulses

          // Core vertical beam — ultra-thin bright column
          const beamGrad = ctx.createLinearGradient(ox, 0, ox, canvas.height);
          beamGrad.addColorStop(0,   "rgba(255,255,255,0)");
          beamGrad.addColorStop(0.3, "rgba(200,230,255," + (beamPeak * 0.6).toFixed(2) + ")");
          beamGrad.addColorStop(0.5, "rgba(255,255,255," + (beamPeak * 0.9).toFixed(2) + ")");
          beamGrad.addColorStop(0.7, "rgba(200,230,255," + (beamPeak * 0.6).toFixed(2) + ")");
          beamGrad.addColorStop(1,   "rgba(255,255,255,0)");
          ctx.save();
          ctx.globalCompositeOperation = "lighter";
          ctx.fillStyle = beamGrad;
          ctx.fillRect(ox - bw * 0.5, 0, bw, canvas.height);

          // Outer soft glow column
          const glowGrad = ctx.createLinearGradient(ox - bw * 2, oy, ox + bw * 2, oy);
          glowGrad.addColorStop(0,   "rgba(100,180,255,0)");
          glowGrad.addColorStop(0.3, "rgba(150,220,255," + (beamPeak * 0.25).toFixed(2) + ")");
          glowGrad.addColorStop(0.5, "rgba(200,240,255," + (beamPeak * 0.4).toFixed(2) + ")");
          glowGrad.addColorStop(0.7, "rgba(150,220,255," + (beamPeak * 0.25).toFixed(2) + ")");
          glowGrad.addColorStop(1,   "rgba(100,180,255,0)");
          ctx.fillStyle = glowGrad;
          ctx.fillRect(ox - bw * 2, 0, bw * 4, canvas.height);
          ctx.restore();

          // Water swirl rings — ellipses rotating around beam at player position
          ctx.save();
          ctx.globalCompositeOperation = "lighter";
          const numRings = 5;
          for (let ri = 0; ri < numRings; ri++) {
            const ringPhase = (ri / numRings) * Math.PI * 2;
            const ringT = t * 2.5 + ringPhase;
            const ringR = (30 + ri * 18) * beamPeak;
            const ringY = oy + Math.sin(ringT * 0.7 + ringPhase) * 40 * beamPeak;
            const ringAlpha = beamPeak * (0.15 + 0.1 * Math.sin(ringT));
            const ringW = ringR * (1 + 0.3 * Math.sin(ringT * 1.3));
            ctx.beginPath();
            ctx.ellipse(ox, ringY, ringW, ringW * 0.3, ringT * 0.4, 0, Math.PI * 2);
            ctx.strokeStyle = "rgba(180,230,255," + ringAlpha.toFixed(2) + ")";
            ctx.lineWidth = 1.5;
            ctx.stroke();
          }

          // Swirling particles along the beam
          const numParts = 12;
          for (let pi = 0; pi < numParts; pi++) {
            const pPhase = (pi / numParts) * Math.PI * 2;
            const pT = t * 3 + pPhase;
            const pAngle = pT + pPhase;
            const pRadius = (15 + 20 * Math.abs(Math.sin(pPhase))) * beamPeak;
            const px2 = ox + Math.cos(pAngle) * pRadius * 0.4; // squish X for vortex feel
            const py2 = oy + Math.sin(pT * 0.5 + pPhase) * (canvas.height * 0.4) * beamPeak;
            const pAlpha = beamPeak * (0.4 + 0.3 * Math.sin(pT * 2));
            const pSize = (2 + 2 * Math.abs(Math.sin(pPhase + pT))) * beamPeak;
            ctx.beginPath();
            ctx.arc(px2, py2, pSize, 0, Math.PI * 2);
            ctx.fillStyle = "rgba(220,245,255," + pAlpha.toFixed(2) + ")";
            ctx.fill();
          }
          ctx.restore();
        }

        // ── Infinite mirror effect on player sprite during transition ──
        if (player && player.spriteLoaded && player.spriteSheet && a > 0.05) {
          const pw = player.width * camera.zoom;
          const ph = player.height * camera.zoom;
          // Compute srcX/srcY from player direction (same logic as Player.render)
          const dirMap = { down:0, up:1, right:2, left:3 };
          const row = dirMap[player.direction] || 0;
          const frame = Math.floor(globalTime * 8) % 4;
          const sx = frame * 32, sy = row * 32;

          const NUM_MIRRORS = 8;
          const spacing = ph * 0.85; // vertical gap between copies
          const baseAlpha = Math.sin(a * Math.PI); // peaks at a=0.5

          ctx.save();
          const parallax = Math.sin(a * Math.PI); // peaks at transition midpoint
          for (let m = -NUM_MIRRORS; m <= NUM_MIRRORS; m++) {
            if (m === 0) continue;
            const dist = Math.abs(m);
            const sign = m > 0 ? 1 : -1;
            // Base spread position
            const baseY = oy - ph * 0.5 + m * spacing;
            // Parallax: drift inward toward player
            const driftY = baseY - sign * dist * spacing * 0.4 * parallax;
            // Every other copy is upside-down (vertical flip)
            const flipped = m % 2 !== 0;
            const mirrorAlpha = baseAlpha * Math.max(0, 1 - dist * 0.18);
            if (mirrorAlpha <= 0.01) continue;

            ctx.save();
            ctx.globalAlpha = mirrorAlpha;
            if (flipped) {
              // Flip vertically around copy centre
              ctx.translate(0, driftY + ph * 0.5);
              ctx.scale(1, -1);
              ctx.translate(0, -(driftY + ph * 0.5));
            }
            ctx.drawImage(player.spriteSheet, sx, sy, 32, 32,
              ox - pw * 0.5, driftY, pw, ph);
            ctx.restore();
          }
          ctx.restore();
        }
      } else {
        ctx.fillStyle = _realmFadeColor;
        ctx.globalAlpha = a;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.globalAlpha = 1;
      }
      ctx.restore();
    }

    // Enter Sanctuary — save return position first
    function enterSanctuary() {
      // Full cleanup so this works from death screen, gate, or anywhere
      const _lingering = document.getElementById("narrativeCard");
      if (_lingering) _lingering.remove();
      const _bco = document.getElementById("bossChoiceOverlay");
      if (_bco) _bco.remove();
      const _sgo = document.getElementById("stargateOverlay");
      if (_sgo) _sgo.remove();
      deathOverlayShown = false;
      deathAlertShown = true;
      player.isDead = false;
      // Sanctuary has no weather — reset to clear
      weatherState = "sunshine";
      weatherTimer = 999;
      thunderTintAlpha = 0;
      player.hp = player.maxHP;
      blessingChoiceActive = false;
      waveBetween = false;
      isUpgradeMenuVisible = false;
      enemies.length = 0;
      bullets.length = 0;
      baitBombs.length = 0;
      pickups.length = 0;
      timeScale = 1.0;
      slowMotionTimer = 0;
      // Remember where to come back to
      if (currentRealm !== "sanctuary") {
        _lastCombatZoneId = currentZoneId || "khem";
        _lastCombatGridX  = player.gridX;
        _lastCombatGridY  = player.gridY;
      }
      _realmFadeColor = "#ffffff"; _realmFadeStyle = "iris";
      realmFadeTo(() => {
        currentRealm = "sanctuary";
        realmPhase = "hub"; // was "overworld" — sanctuary is a hub, not overworld
        if (!sanctuaryMap) {
          sanctuaryMap = new TileMap(CONFIG.MAP_WIDTH, CONFIG.MAP_HEIGHT, CONFIG.TILE_WIDTH, CONFIG.TILE_HEIGHT, "sanctuary");
        }
        // Swap active tile map reference for rendering + movement
        _activeMap = sanctuaryMap;
        player.tileMap = sanctuaryMap;
        // Teleport player to sanctuary centre
        const cx = Math.floor(CONFIG.MAP_WIDTH / 2);
        const cy = Math.floor(CONFIG.MAP_HEIGHT / 2);
        player.gridX = cx - 3; player.gridY = cy - 3;
        player.position = sanctuaryMap.gridToWorld(player.gridX, player.gridY);
        player.targetGridX = player.gridX; player.targetGridY = player.gridY;
        player.moving = false;
        // Clear enemies — sanctuary is safe
        enemies.length = 0; bullets.length = 0; baitBombs.length = 0;
        // Enter via zone system
        enterZone("sanctuary");
      });
    }
    // Expose on window immediately so outer-scope death button can call it
    window._enterSanctuary = enterSanctuary;

    // Return from sanctuary — enter overworld phase briefly, waves resume when player moves
    function leaveSanctuary() {
      const _lingering = document.getElementById("narrativeCard");
      if (_lingering) _lingering.remove();
      // Apply all placed sanctuary item effects before leaving
      applySanctuaryEffects();
      buildSelectedItem = null;
      const _bm = document.getElementById("buildMenu");
      if (_bm) _bm.remove();
      buildMenuOpen = false;
      timeScale = 1.0;
      const _returnPalKey = (discoveredWorlds.find(w => w.id === _lastCombatZoneId) || {paletteKey:"khem"}).paletteKey;
      const _leaveColor = (REALM_PALETTES[_returnPalKey] || REALM_PALETTES.default).bg || "#000000";
      _realmFadeColor = _leaveColor; _realmFadeStyle = "iris";
      realmFadeTo(() => {
        // Return to whichever world we came from
        const _returnWorld = discoveredWorlds.find(w => w.id === _lastCombatZoneId) ||
                             discoveredWorlds[discoveredWorlds.length - 1] ||
                             { id: "khem", name: "Khem" };
        currentRealm = _returnWorld.id;
        currentZoneId = _returnWorld.id;
        realmPhase = "overworld";   // no waves immediately on arrival
        _activeMap = combatMap;
        player.tileMap = combatMap;
        player.gridX = _lastCombatGridX;
        player.gridY = _lastCombatGridY;
        player.position = combatMap.gridToWorld(player.gridX, player.gridY);
        player.targetGridX = player.gridX; player.targetGridY = player.gridY;
        player.moving = false;
        enemies.length = 0; bullets.length = 0; baitBombs.length = 0;
        // Show arrival narrative, then resume combat when dismissed
        const _rw = discoveredWorlds.find(w => w.id === currentZoneId) ||
                     { name: currentZoneId, icon: "⚱️" };
        showNarrativeCard({
          icon: _rw.icon || "⚱️",
          title: "Back in " + _rw.name,
          text: "The gate seals. The shades have not rested.",
          onDismiss: () => {
            realmPhase = "combat";
            waveBetween = true; waveBetweenTimer = 2.0;
          }
        });
      });
    }

    // Active map pointer — swaps between sanctuaryMap and combatMap
    let _activeMap = tileMap; // starts as combatMap

    // ── Narrative Card System ─────────────────────────────────────
    // Full-screen story cards — no combat, just text and continue
    function showNarrativeCard(card) {
      if (!card) return;
      const existing = document.getElementById("narrativeCard");
      if (existing) existing.remove();

      const overlay = document.createElement("div");
      overlay.id = "narrativeCard";
      overlay.style.cssText = [
        "position:fixed","inset:0","z-index:8500",
        "display:flex","flex-direction:column",
        "align-items:center","justify-content:center",
        "background:rgba(0,0,0,0.88)",
        "font-family:serif","animation:narrativeFadeIn 0.6s ease-out",
        "cursor:pointer","padding:2rem"
      ].join(";");

      overlay.innerHTML =
        '<div style="max-width:520px;text-align:center;">' +
          '<div style="font-size:2.4rem;margin-bottom:1.2rem;">' + (card.icon || "📜") + '</div>' +
          '<div style="font-size:1.1rem;color:rgba(255,240,180,0.95);font-weight:bold;' +
               'letter-spacing:0.06em;margin-bottom:1rem;">' + card.title + '</div>' +
          '<div style="font-size:0.92rem;color:rgba(255,255,255,0.75);line-height:1.9;' +
               'margin-bottom:1.8rem;">' + card.text + '</div>' +
          '<div style="font-size:0.75rem;color:rgba(255,255,255,0.3);letter-spacing:0.1em;">' +
               'A / Start / Tap to continue</div>' +
        '</div>';

      // Pause game time while reading — always restore to 1.0 on dismiss
      timeScale = 0;

      const dismiss = () => {
        overlay.style.animation = "narrativeFadeOut 0.4s ease-in forwards";
        setTimeout(() => { overlay.remove(); timeScale = 1.0; }, 380);
        if (card.onDismiss) card.onDismiss();
      };
      overlay.addEventListener("click", dismiss);
      overlay.addEventListener("keydown", e => { if (e.key === " " || e.key === "Enter") dismiss(); });
      document.body.appendChild(overlay);

      // Inject keyframes once
      if (!document.getElementById("narrativeStyles")) {
        const s = document.createElement("style");
        s.id = "narrativeStyles";
        s.textContent =
          "@keyframes narrativeFadeIn{from{opacity:0;transform:scale(0.97)}to{opacity:1;transform:scale(1)}}" +
          "@keyframes narrativeFadeOut{from{opacity:1}to{opacity:0}}";
        document.head.appendChild(s);
      }
    }

    // ── Narrative Content — Sanctuary & Khem ─────────────────────
    const SANCTUARY_ARRIVAL = {
      icon: "🏛️",
      title: "The Sanctuary",
      text: "Between the worlds, there is a place the gate-builders called the Still Point. " +
            "Here the dagger rests. Here the wounds close. " +
            "The gate at the centre still hums — its address rings carved by hands long turned to dust. " +
            "You are not the first to pass through. You will not be the last.",
      onDismiss: () => { showStargateHint(); }
    };

    const KHEM_ARRIVAL = {
      icon: "⚱️",
      title: "Khem — The Black Land",
      text: "The gate opens onto a sky the colour of bronze. Sand the colour of bone. " +
            "The builders here called themselves the Kemetyu — people of the black earth. " +
            "They believed the dead did not leave. They simply crossed a different threshold. " +
            "The shades that rise against you are not evil. They are simply lost, " +
            "still walking the roads they knew in life.",
    };

    const SANCTUARY_STARGATE_LORE = {
      icon: "🌀",
      title: "The Gate",
      text: "Seven symbols lock a destination. Six describe where you are going. " +
            "The seventh is always the same — the mark of the world you came from. " +
            "The builders understood this as prayer: you must name your origin " +
            "before you can name your destination. " +
            "The next address is almost complete.",
    };

    function showStargateHint() {
      setTimeout(() => showNarrativeCard(SANCTUARY_STARGATE_LORE), 1200);
    }

    // ── Sanctuary HUD overlay — shows when in sanctuary mode ─────
    function renderZoneMarkers(ctx, camera) {
      if (realmPhase === "hub") return;
      const _map = _activeMap || tileMap;
      const tw = _map.tileWidth, th = _map.tileHeight;

      Object.values(REALM_ZONES).forEach(zone => {
        if (!zone.gridRegion) return;
        if (zone.realm !== currentRealm && currentRealm !== "default") return;
        if (zone.id === currentZoneId) return; // don't mark current zone

        const r = zone.gridRegion;
        const isUnlocked = isZoneUnlocked(zone.id);
        const isLocked = !isUnlocked;

        // Convert grid corners to world then screen
        // Isometric: we mark the 4 corner tiles
        const corners = [
          _map.gridToWorld(r.x,       r.y),
          _map.gridToWorld(r.x + r.w, r.y),
          _map.gridToWorld(r.x + r.w, r.y + r.h),
          _map.gridToWorld(r.x,       r.y + r.h),
        ].map(w => camera.worldToScreen(w));

        // Draw isometric diamond outline
        ctx.save();
        const pulse = 0.4 + 0.3 * Math.sin(globalTime * 2);
        if (isLocked) {
          ctx.strokeStyle = "rgba(100,100,100," + (pulse * 0.5).toFixed(2) + ")";
          ctx.setLineDash([6, 6]);
        } else if (zone.type === "combat") {
          ctx.strokeStyle = "rgba(220,80,80," + (pulse + 0.2).toFixed(2) + ")";
          ctx.setLineDash([4, 4]);
        } else if (zone.type === "hub") {
          ctx.strokeStyle = "rgba(80,180,255," + (pulse + 0.2).toFixed(2) + ")";
          ctx.setLineDash([]);
        } else {
          ctx.strokeStyle = "rgba(100,220,120," + (pulse + 0.1).toFixed(2) + ")";
          ctx.setLineDash([6, 3]);
        }
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        // Draw connecting lines between corners in iso diamond order
        const isoCorners = [
          camera.worldToScreen(_map.gridToWorld(r.x + r.w/2, r.y)),           // top
          camera.worldToScreen(_map.gridToWorld(r.x + r.w,   r.y + r.h/2)),   // right
          camera.worldToScreen(_map.gridToWorld(r.x + r.w/2, r.y + r.h)),     // bottom
          camera.worldToScreen(_map.gridToWorld(r.x,         r.y + r.h/2)),   // left
        ];
        ctx.moveTo(isoCorners[0].x + tw/2, isoCorners[0].y);
        for (let i = 1; i < 4; i++) ctx.lineTo(isoCorners[i].x + tw/2, isoCorners[i].y + th/2);
        ctx.closePath();
        ctx.stroke();
        ctx.setLineDash([]);

        // Zone label at top diamond point
        const labelPos = isoCorners[0];
        const icon = zone.type === "combat" ? "⚔️" : zone.type === "hub" ? "🏛️" : "⟳";
        const name = zone.onEnter ? zone.onEnter.title : zone.id;
        ctx.font = "bold 11px sans-serif";
        ctx.textAlign = "center";
        if (isLocked) {
          ctx.fillStyle = "rgba(150,150,150,0.5)";
          ctx.fillText("🔒 " + name, labelPos.x + tw/2, labelPos.y - 6);
        } else {
          ctx.fillStyle = zone.type === "combat" ? "rgba(255,160,160,0.85)" :
                          zone.type === "hub" ? "rgba(160,210,255,0.85)" : "rgba(160,255,180,0.85)";
          ctx.strokeStyle = "rgba(0,0,0,0.5)"; ctx.lineWidth = 2;
          ctx.strokeText(icon + " " + name, labelPos.x + tw/2, labelPos.y - 6);
          ctx.fillText(icon + " " + name, labelPos.x + tw/2, labelPos.y - 6);
        }
        ctx.restore();
      });
    }

    function renderZoneHUD(ctx, canvas) {
      if (realmPhase === "hub") return;
      ctx.save();

        if (!enemy.alive || enemy.deathTimer !== undefined) return;

        const ey = enemy.position.y + enemy.height / 2;
        let inContact = false;

        safeZoneTiles.forEach(key => {
          const [gx, gy] = key.split(",").map(Number);
          const tile = tileMap.tiles[gy] && tileMap.tiles[gy][gx];
          if (!tile || tile.tileType !== 4) return;
          const tileWorld = tileMap.gridToWorld(gx, gy);
          const tx = tileWorld.x + tileMap.tileWidth / 2;
          const ty = tileWorld.y + tileMap.tileHeight / 2;
          const dist = Math.sqrt((ex - tx) * (ex - tx) + (ey - ty) * (ey - ty));

      const tileAttackers = {}; // key -> { enemy, dist }

      enemies.forEach(enemy => {
        if (enemy.deathTimer !== undefined) return; // already dying, skip
        // Only check adjacent tiles (not the tile the enemy stands on — those get fried)
        const dirs = [{dx:1,dy:0},{dx:-1,dy:0},{dx:0,dy:1},{dx:0,dy:-1}];
        dirs.forEach(({dx, dy}) => {

          const key = `${gx},${gy}`;
          if (!safeZoneTiles.has(key)) return;
          const tile = tileMap.tiles[gy][gx];
          if (tile.tileType !== 4) { safeZoneTiles.delete(key); return; }
          const dist = Math.abs(dx) + Math.abs(dy);

      let dx = gridX - player.gridX, dy = gridY - player.gridY;
      let direction;
      if(Math.abs(dx)+Math.abs(dy)===1)
        direction = dx===1?"right": dx===-1?"left": dy===1?"down":"up";
      else
        direction = Math.abs(dx)>=Math.abs(dy) ? (dx>0?"right":"left") : (dy>0?"down":"up");
      return direction;
    }

    function deployBomb() {
      if (bombCount <= 0) return;
      if (hasMegaBomb && megaBombMode) {
        if (megaBombCooldown > 0) {
          showUpgradeAlert(`💥 Mega Bomb cooling down… ${megaBombCooldown.toFixed(1)}s`);
          return;
        }
        if (megaBombCountdown > 0) return;
        bombCount--;
        updateInventoryDisplay();
        megaBombCountdown = 2.0;
        showUpgradeAlert("💥 MEGA BOMB — 2 seconds!");
        playSFX("bombDeploy");
        return;
      }
      const TOSS_TILES = 3;
      // Use aim angle if active, otherwise use player facing direction
      let dx = 0, dy = 0;
      if (gpAimActive && gpAimAngle !== undefined) {
        // Convert screen-space aim angle back to isometric grid offset
        // Inverse of iso rotation: ax = (isoX - isoY)/2, ay = (isoX + isoY)/2
        // We just want the dominant direction from raw screen angle
        const screenX = Math.cos(gpAimAngle);
        const screenY = Math.sin(gpAimAngle);
        // iso axes: right=(+1,+1)/√2, up=(+1,-1)/√2, left=(-1,-1)/√2, down=(-1,+1)/√2
        // dot against each iso screen direction to pick best match
        const dots = {
          right: screenX * 0.707 + screenY * 0.707,
          up:    screenX * 0.707 - screenY * 0.707,
          left: -screenX * 0.707 - screenY * 0.707,
          down: -screenX * 0.707 + screenY * 0.707,
        };
        const best = Object.entries(dots).sort((a,b) => b[1]-a[1])[0][0];
        if (best === "right")      { dx =  1; dy =  0; }
        else if (best === "left")  { dx = -1; dy =  0; }
        else if (best === "up")    { dx =  0; dy = -1; }
        else                       { dx =  0; dy =  1; }
      } else {
        switch (player.direction) {
          case "right": dx =  1; dy =  0; break;
          case "left":  dx = -1; dy =  0; break;
          case "up":    dx =  0; dy = -1; break;
          case "down":  dx =  0; dy =  1; break;
        }
      }
      // Find landing tile — step up to TOSS_TILES, stop at impassable
      let tx = player.gridX, ty = player.gridY;
      for (let i = 1; i <= TOSS_TILES; i++) {
        const nx = player.gridX + dx * i;
        const ny = player.gridY + dy * i;
        if (nx < 0 || ny < 0 || nx >= tileMap.width || ny >= tileMap.height) break;
        if (!isTilePassable(tileMap.tiles[ny][nx])) break;
        tx = nx; ty = ny;
      }
      bombCount--;
      baitBombs.push(new BaitBomb(tx, ty, tileMap));
      showUpgradeAlert("Bomb tossed!");
      playSFX("bombDeploy");
      updateInventoryDisplay();
    }
    class BaitBomb {
      constructor(tileX, tileY, tileMap) {
        this.tileMap = tileMap;
        this.tileX = tileX;
        this.tileY = tileY;
        this.position = tileMap.gridToWorld(tileX, tileY);
        this.timer = 3.0;
      }
      update(deltaTime) { this.timer -= deltaTime; }
      render(ctx, camera, t) {
        let screenPos = camera.worldToScreen(this.position);
        // Pulse faster and glow red as timer runs out
        const urgency = 1 - (this.timer / 3.0);
        const pulseRate = 10 + urgency * 20;
        let pulse = 1 + 0.2 * Math.sin(t * pulseRate);
        ctx.save();
        ctx.translate(screenPos.x, screenPos.y);
        ctx.scale(pulse, pulse);
        // Glow red when under 1 second
        if (this.timer < 1.0) {
          ctx.shadowBlur = 20 + Math.sin(t * 30) * 10;
          ctx.shadowColor = "rgba(255,50,50,0.9)";
        }
        ctx.font = `${this.tileMap.tileWidth/2}px sans-serif`;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText("💣", 0, 0);
        ctx.restore();
        // Timer countdown
        ctx.font = "bold 12px sans-serif";
        ctx.fillStyle = this.timer < 1.0 ? "#ff4444" : "white";
        ctx.textAlign = "center";
        ctx.fillText(this.timer.toFixed(1), screenPos.x, screenPos.y - 18);
        // Explosion radius preview ring — isometric ellipse (matches blood splat perspective)
        const ringAlpha = Math.min(0.35, urgency * 0.5);
        if (ringAlpha > 0.03) {
          const ringR = this.tileMap.tileWidth * 2.4;
          const cx = screenPos.x + this.tileMap.tileWidth / 2;
          const cy = screenPos.y + this.tileMap.tileHeight / 2;
          ctx.save();
          ctx.beginPath();
          ctx.ellipse(cx, cy, ringR, ringR * 0.55, 0, 0, Math.PI * 2);
          ctx.strokeStyle = `rgba(255, 80, 0, ${ringAlpha})`;
          ctx.lineWidth = 2;
          ctx.setLineDash([6, 4]);
          ctx.stroke();
          ctx.setLineDash([]);
          ctx.restore();
        }
      }
    }

        if (pickup._magnet || player._magnet) {
          const px = player.position.x + player.width/2;
          const py = player.position.y + player.height/2;
          const qx = pickup.position.x + pickup.size/2;
          const qy = pickup.position.y + pickup.size/2;
          const dx = px - qx, dy = py - qy;
          const dist = Math.sqrt(dx*dx+dy*dy);
          if (dist > 2) {
            const speed = player._magnet ? 300 : 150;
            pickup.position = new Vector2(
              pickup.position.x + (dx/dist) * speed * deltaTime,
              pickup.position.y + (dy/dist) * speed * deltaTime
            );

        }

        if(player.position.x < pickup.position.x+pickup.size &&
           player.position.x+player.width > pickup.position.x &&

    // ============================================================
    // SIGIL AURA — Enemies standing on sigil ground marks take DOT and get slowed
    // ============================================================
    const SIGIL_DOT_INTERVAL = 0.5;  // seconds between damage ticks
    const SIGIL_DOT_DAMAGE = 5;      // damage per tick
    const SIGIL_SLOW_MULT = 2.5;     // moveDuration multiplier while on sigil
    const SIGIL_MIN_ALPHA = 0.15;    // sigils below this alpha are too faded to affect enemies

    function updateSigilAura(deltaTime) {
      // Early exit — no sigils, nothing to do
      if (sigilMarks.length === 0) return;

      // Pre-filter to only active sigils (still visible enough to have power)
      const activeSigils = sigilMarks.filter(m => m.alpha >= SIGIL_MIN_ALPHA);
      if (activeSigils.length === 0) return;

      enemies.forEach(enemy => {
        if (!enemy.alive || enemy.deathTimer !== undefined) return;

        const ex = enemy.position.x + enemy.width / 2;
        const ey = enemy.position.y + enemy.height / 2;

        // Check if enemy center is within any sigil's radius
        let onSigil = false;
        for (let i = 0; i < activeSigils.length; i++) {
          const m = activeSigils[i];
          const dx = ex - m.wx;
          const dy = ey - m.wy;
          if (dx * dx + dy * dy < m.radius * m.radius) {
            onSigil = true;
            break;
          }
        }

        if (onSigil) {
          // Apply slow — inflate moveDuration while on sigil
          if (!enemy._sigilSlowed) {
            enemy._sigilSlowed = true;
            enemy._sigilOrigMoveDuration = enemy.moveDuration;
          }
          // Only re-apply slow if not already moving (don't interrupt mid-move)
          if (!enemy.moving) {
            enemy.moveDuration = (enemy._sigilOrigMoveDuration || 0.2) * SIGIL_SLOW_MULT;
          }

          // DOT tick
          if (enemy._sigilDotTimer === undefined) enemy._sigilDotTimer = SIGIL_DOT_INTERVAL;
          enemy._sigilDotTimer -= deltaTime;
          if (enemy._sigilDotTimer <= 0) {
            enemy._sigilDotTimer = SIGIL_DOT_INTERVAL;
            damageEnemy(enemy, SIGIL_DOT_DAMAGE);
            // Subtle visual: small yellow flash on DOT tick

function applyDamage(damage) {
  // ZYN invincibility — absorb all damage
  if (zynInvincTimer > 0) {
    spawnImpactFlash(player.position.x + player.width/2, player.position.y + player.height/2);
    return;
  }
  // Ward blessing: first hit each wave is absorbed
  if (player._ward && player._wardReady) {
    player._wardReady = false;
    showUpgradeAlert("🧿 Ward absorbed the hit!");
    spawnImpactFlash(player.position.x + player.width/2, player.position.y + player.height/2);
    gpRumble(0.2, 0.1, 100);
    return;
  }
  // Check if player has Heavy Armour.
  if (player.heavyArmour) {
    let remainingDurability = player.heavyArmour.durability - damage;
    if (remainingDurability > 0) {
      // Armour fully absorbs the damage.
      player.heavyArmour.durability = remainingDurability;
      
      updateInventoryDisplay();
      // Set glow timer so the heavy armour effect is visible.
      player.heavyArmorGlowTimer = 0.5;
      return; // Exit so no HP is lost.
    } else {
      // Armour is broken; calculate the leftover damage.
      damage = -remainingDurability;
      player.heavyArmour = null;
      showUpgradeAlert("Heavy Armour destroyed!");
      updateInventoryDisplay();
    }
  }
  
  // Apply any remaining damage to the player's HP.
  player.hp -= damage;
  playerHitVignette = 0.7;
  screenShakeTime = 0.18; screenShakeMagnitude = 8;
  player.flashDamage();
  gpRumble(0.8, 0.5, 200);
  // Damage reflect synergy — deal 20% of incoming damage back to the nearest attacker
  if (synergyReflect && damage > 0) {
    let nearestEnemy = null, nearestDist = Infinity;
    enemies.forEach(e => {
      if (!e.alive || e.deathTimer !== undefined) return;
      const d = Math.abs(e.gridX - player.gridX) + Math.abs(e.gridY - player.gridY);
      if (d < nearestDist) { nearestEnemy = e; nearestDist = d; }
    });
    if (nearestEnemy && nearestDist <= 3) {
      damageEnemy(nearestEnemy, Math.ceil(damage * 0.2));
    }
  }
}
