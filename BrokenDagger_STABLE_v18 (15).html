function gpRenderAimIndicator(ctx, camera) {
  if (!gpAimActive) return;
  const playerCenter = new Vector2(
    player.position.x + player.width / 2,
    player.position.y + player.height / 2
  );

  // ── Sanctuary placement mode — snap reticle to tile grid ────
  if (buildSelectedItem && currentRealm === "sanctuary") {
    const _map = sanctuaryMap || tileMap;
    const strikeRange = 3 * _map.tileWidth; // fixed reach for placement
    const pScreen = camera.worldToScreen(playerCenter);
    const rx = pScreen.x + Math.cos(gpAimAngle) * strikeRange * 0.75;
    const ry = pScreen.y + Math.sin(gpAimAngle) * strikeRange * 0.75;

    // Convert reticle screen pos → world → grid (inverse isometric)
    const worldPos = camera.screenToWorld(new Vector2(rx, ry));
    const hw = _map.tileWidth / 2, hh = _map.tileHeight / 2;
    const isoA = worldPos.x / hw;
    const isoB = worldPos.y / hh;
    const snapGx = Math.round((isoA + isoB) / 2);
    const snapGy = Math.round((isoB - isoA) / 2);
    const sgx = Math.max(3, Math.min(_map.width - 4, snapGx));
    const sgy = Math.max(3, Math.min(_map.height - 4, snapGy));

    // Store snapped position for placement on confirm
    gpAimBuildTileX = sgx;
    gpAimBuildTileY = sgy;

    // Draw snapped tile highlight
    const snapWorld = _map.gridToWorld(sgx, sgy);
    const snapScreen = camera.worldToScreen(snapWorld);
    const pulse = 0.5 + 0.5 * Math.sin(globalTime * 4);
    const occupied = sanctuaryPlaced.some(p => p.tileX === sgx && p.tileY === sgy);
    const colour = occupied ? "rgba(255,80,80," : "rgba(100,180,255,";

    ctx.save();
    // Tile diamond highlight
    ctx.strokeStyle = colour + (0.5 + 0.4 * pulse).toFixed(2) + ")";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(snapScreen.x + hw, snapScreen.y);
    ctx.lineTo(snapScreen.x + _map.tileWidth, snapScreen.y + hh);
    ctx.lineTo(snapScreen.x + hw, snapScreen.y + _map.tileHeight);
    ctx.lineTo(snapScreen.x, snapScreen.y + hh);
    ctx.closePath();
    ctx.stroke();
    // Fill
    ctx.fillStyle = colour + (0.12 + 0.08 * pulse).toFixed(2) + ")";
    ctx.fill();
    // Item emoji preview inside tile
    ctx.font = "22px serif";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.globalAlpha = 0.7 + 0.3 * pulse;
    ctx.fillText(buildSelectedItem.def.icon, snapScreen.x + hw, snapScreen.y + hh);
    ctx.globalAlpha = 1;
    // Label
    ctx.font = "bold 11px sans-serif";
    ctx.fillStyle = occupied ? "rgba(255,120,100,0.9)" : "rgba(160,210,255,0.9)";
    ctx.strokeStyle = "rgba(0,0,0,0.5)"; ctx.lineWidth = 2;
    const lbl = occupied ? "Occupied" : "[RT / A] Place";
    ctx.strokeText(lbl, snapScreen.x + hw, snapScreen.y - 10);
    ctx.fillText(lbl,   snapScreen.x + hw, snapScreen.y - 10);
    // Line from player to tile
    ctx.strokeStyle = colour + "0.3)";
    ctx.lineWidth = 1;
    ctx.setLineDash([4, 4]);
    ctx.beginPath();
    ctx.moveTo(pScreen.x, pScreen.y);
    ctx.lineTo(snapScreen.x + hw, snapScreen.y + hh);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.restore();
    return;
  }

  const strikeRange = (strikeRangeTiles > 1 && player.strikeMeter >= 10)
    ? strikeRangeTiles * 50 : player.normalStrikeRange;
  const pScreen = camera.worldToScreen(playerCenter);
  const screenDist = (strikeRange / 50) * tileMap.tileWidth * 0.75;
  const rx = pScreen.x + Math.cos(gpAimAngle) * screenDist;
  const ry = pScreen.y + Math.sin(gpAimAngle) * screenDist;

  ctx.save();
  ctx.strokeStyle = "rgba(255,230,80,0.45)";
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(pScreen.x, pScreen.y);
  ctx.lineTo(rx, ry);
  ctx.stroke();
  const reticleR = 10 + (strikeRange / 50) * 4;
  ctx.strokeStyle = "rgba(255,230,80,0.75)";
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(rx, ry, reticleR, 0, Math.PI * 2);
  ctx.stroke();
  ctx.fillStyle = "rgba(255,230,80,0.9)";
  ctx.beginPath();
  ctx.arc(rx, ry, 3, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

    function spawnSigilMark(worldX, worldY, radius) {
      // Angular pentagraphic sigil — star polygons drawn by connecting every Nth vertex
      // of a regular polygon. Layering multiple rotations creates complex ritual geometry.

      const rotation = Math.random() * Math.PI * 2;

      // Pick a random configuration of layered star polygons
      const configs = [
        // {n: vertices, steps: skip, copies: rotated layers}
        { layers: [{ n: 5, step: 2 }, { n: 5, step: 2 }], rotOffset: Math.PI / 5 },   // classic pentagram + twin
        { layers: [{ n: 7, step: 2 }, { n: 7, step: 3 }], rotOffset: Math.PI / 7 },   // heptagram double
        { layers: [{ n: 6, step: 2 }, { n: 6, step: 2 }], rotOffset: Math.PI / 6 },   // hexagram + star
        { layers: [{ n: 8, step: 3 }, { n: 8, step: 3 }], rotOffset: Math.PI / 8 },   // octagram
        { layers: [{ n: 5, step: 2 }, { n: 10, step: 3 }], rotOffset: Math.PI / 10 }, // pentagram inside decagram
        { layers: [{ n: 9, step: 4 }, { n: 9, step: 2 }], rotOffset: Math.PI / 9 },   // nonagram
        { layers: [{ n: 7, step: 2 }, { n: 7, step: 2 }, { n: 7, step: 3 }], rotOffset: Math.PI / 14 }, // triple heptagram
      ];
      const cfg = configs[Math.floor(Math.random() * configs.length)];

      // Build point arrays for each layer
      // A star polygon {n/step} visits every `step`-th vertex of an n-gon
      const buildStarPoints = (n, step, rot, r) => {
        const pts = [];
        let current = 0;
        const visited = new Set();
        while (!visited.has(current)) {
          visited.add(current);
          const angle = rot + (current / n) * Math.PI * 2 - Math.PI / 2;
          pts.push({ x: Math.cos(angle) * r, y: Math.sin(angle) * r });
          current = (current + step) % n;
        }
        pts.push(pts[0]); // close
        return pts;
      };

      const layers = cfg.layers.map((l, i) => ({
        pts: buildStarPoints(l.n, l.step, rotation + i * cfg.rotOffset, 1),
        innerR: 0.3 + Math.random() * 0.15, // inner vertex ring radius
        n: l.n,
        step: l.step,
      }));

      // Also compute a small inner circle of dots at each vertex for ritual feel
      const dotAngles = Array.from({ length: cfg.layers[0].n }, (_, i) =>
        rotation + (i / cfg.layers[0].n) * Math.PI * 2 - Math.PI / 2
      );

      sigilMarks.push({
        wx: worldX, wy: worldY,
        radius,
        layers,
        dotAngles,
        alpha: 0.9,
        decayRate: 0.010 + Math.random() * 0.006,

    // Point-in-polygon test (ray casting) in grid space
    function gridPointInPolygon(gx, gy, poly) {
      let inside = false;
      for (let i = 0, j = poly.length - 1; i < poly.length; j = i++) {
        const xi = poly[i].gx, yi = poly[i].gy;
        const xj = poly[j].gx, yj = poly[j].gy;
        if (((yi > gy) !== (yj > gy)) &&
            (gx < (xj - xi) * (gy - yi) / (yj - yi) + xi)) {

      return inside;

        highlight: null, trigger: "start", autoNext: 6000 },
      { title: "Earn XP & Points 💰",
        text: "Kills earn points AND XP toward your rank. Chain kills for a COMBO multiplier — bonus on every 3rd kill! Unspent points convert to XP at wave end.",
        highlight: "pointsSlot", trigger: "firstKill", autoNext: 7000 },
      { title: "Player Menu 📋",
        text: "Open the Player Menu (top right) to buy upgrades and shop items. Check the ✨ Shrine tab to see your active blessings — earned by defeating bosses.",
        highlight: "upgradeButton", trigger: "firstKill", autoNext: 6000 },
      { title: "Wave Progress 🌊",
        text: "The bar shows wave progress. Complete a wave to open the shop — buy upgrades, then unspent points auto-convert to XP when you resume!",
        highlight: "waveBar", trigger: "firstKill", autoNext: 6000 },
      { title: "Auto-Strike ⚔️",
        text: "Collect ⚔️ sword pickups to gain Auto-Strike — you'll swing automatically at nearby enemies while it lasts. Watch the orange glow!",
        highlight: "autoStrikeSlot", trigger: "firstKill", autoNext: 6000 },
      { title: "Gems 💎",
        text: "Collect gems from the floor — Diamond 💎 > Sapphire 🔵 > Emerald 🟢. Gems fill the 🌀 Gate meter (top left). Reach 150 to open a gate and travel to new worlds or Sanctuary.",
        highlight: "killsSlot", trigger: "firstKill", autoNext: 8000 },
      { title: "Bombs 💣",
        text: "Press LB/RB to cycle tray items. Use LT / B / tap the slot to activate. Bombs attract enemies as bait — then detonate!",
        highlight: "explosivesSlot", trigger: "wave2", autoNext: 6000 },
      { title: "Wave Curses ⚡",
        text: "From wave 3 onward, some waves carry a curse — Frenzy speeds enemies up, Horde doubles spawns, Volatile makes them explode on death, Darkness limits vision. Check the wave label!",
        highlight: "waveBar", trigger: "wave2", autoNext: 7000 },
      { title: "Safe Zones 🧱",
        text: "Reach Novice rank to unlock Safe Zone walls from the shop. Buy charges, then tap the 🧱 tray slot to place walls around you. Enemies take damage on contact!",
        highlight: null, trigger: "rank1", autoNext: 7000 },
      { title: "Shrine Blessings ✨",
        text: "After every boss wave, choose one of three permanent blessings — powers like Magnet, Lifesteal, and Mega Bomb. They stack across the run. View active blessings in the ✨ Shrine tab.",
        highlight: "upgradeButton", trigger: "rank1", autoNext: 9000 },
      { title: "The Gate 🌀",
        text: "Collect 150 gems to open a gate tile on the map. Walk to it and press [E / A] to open the Stargate — travel to Sanctuary to build your base, or explore a new world for rare artifacts.",
        highlight: null, trigger: "rank1", autoNext: 9000 },
      { title: "Sanctuary 🏛️",
        text: "Sanctuary is your permanent base. Place artifacts found in worlds to boost future runs — more HP, faster gems, reduced gate cost, and more. Press [B / Y] to open the build menu when you arrive.",
        highlight: null, trigger: "rank1", autoNext: 9000 },
      { title: "Towers 🗼",
        text: "Reach Warrior rank to buy Towers from the shop. Place them from the tray — they shoot enemies and draw aggro. Great for holding a position!",
        highlight: null, trigger: "rank2", autoNext: 7000 },
      { title: "Sigil 🧂",
        text: "Buy Salt from the shop. Hold RT + A (or tap the 🧂 slot) then walk to trace a polygon. Close within 2 tiles of your start point to seal it — all demons inside are struck and a ritual mark is burned into the ground.",
        highlight: "saltSlot", trigger: "firstSalt", autoNext: 9000 },
      { title: "6mg ZYN 🟡",
        text: "ZYN gives 20 meters of slow-mo fuel, 30s invincibility, and auto-strike. Select the ZYN slot in your tray then hold LT to activate slow-mo — release to stop spending. Sustain 8 meters in one hold and you'll OVERLOAD — flash, dark screen, 30s cooldown. Use it in short controlled bursts.",
        highlight: "zynSlot", trigger: "firstZyn", autoNext: 10000 },
    ];

    let _tutShownSteps = new Set();
    const _tutCard = document.getElementById("tutorialCard");
    let _tutTimer = null;
    let _tutQueue = [];

    function _tutClearHighlight() {
      document.querySelectorAll(".tut-highlight").forEach(el => el.classList.remove("tut-highlight"));
    }

    function _tutShowNext() {
      _tutClearHighlight();
      if (_tutQueue.length === 0) { _tutCard.style.display = "none"; return; }
      const step = _tutQueue.shift();
      if (step.highlight) {
        const el = document.getElementById(step.highlight);
        if (el) el.classList.add("tut-highlight");
      }
      _tutCard.innerHTML = `<div class="tut-title">${step.title}</div>${step.text}<div class="tut-hint">Tap to continue</div>`;
      _tutCard.style.display = "block";
      _tutCard.style.animation = "none";
      void _tutCard.offsetWidth;
      _tutCard.style.animation = "tutorialFadeIn 0.3s ease-out";
      if (_tutTimer) clearTimeout(_tutTimer);
      if (step.autoNext) _tutTimer = setTimeout(_tutShowNext, step.autoNext);
    }

    function tutTrigger(event) {
      const steps = TUTORIAL_STEPS.filter(s => s.trigger === event && !_tutShownSteps.has(s.title));
      if (!steps.length) return;
      steps.forEach(s => _tutShownSteps.add(s.title));
      _tutQueue.push(...steps);
      if (_tutCard.style.display === "none") _tutShowNext();
    }

    _tutCard.addEventListener("click", () => {
      if (_tutTimer) { clearTimeout(_tutTimer); _tutTimer = null; }
      _tutShowNext();
    });

    // Gamepad A also advances tutorial
    const _origOnPress = gp._onPress.bind(gp);
    gp._onPress = function(idx) {
      // ── Blessing choice overlay ──────────────────────────────
      // Navigation (d-pad + stick) handled in poll branch with debounce.
      // _onPress only handles confirm and skip.
      const bcEl = document.getElementById("bossChoiceOverlay");
      if (bcEl) {
        if (idx === 0 || idx === 9) { // A / Start — confirm
          if (_bcGpIdx < blessingChoiceOptions.length) {
            _applyBossBlessing(blessingChoiceOptions[_bcGpIdx]);
          } else {
            blessingChoiceActive = false; timeScale = 1.0; bcEl.remove();
            if (_pendingSanctuaryUnlock) {
              const _fn = _pendingSanctuaryUnlock; _pendingSanctuaryUnlock = null;
              setTimeout(_fn, 600);
            }
          }
          return;
        }
        if (idx === 1) { // B — skip
          blessingChoiceActive = false; timeScale = 1.0; bcEl.remove();
          if (_pendingSanctuaryUnlock) {
            const _fn = _pendingSanctuaryUnlock; _pendingSanctuaryUnlock = null;
            setTimeout(_fn, 600);
          }
          return;
        }
        // All other buttons including d-pad: consumed by poll branch, swallow here
        return;
      }

      // ── Death screen ─────────────────────────────────────────
      if (player.isDead && deathOverlayShown) {
        // D-pad left/right or up/down navigates between the two options
        if (idx === 14 || idx === 15) { // d-pad left/right only
          _deathCursorIdx = _deathCursorIdx === 0 ? 1 : 0;
          _deathUpdateFocus(); return;
        }
        // A / Start / B — confirm selected option
        if (idx === 0 || idx === 9 || idx === 1) {
          if (_deathCursorIdx === 0) document.getElementById("respawnBtn").click();
          else document.getElementById("sanctuaryBtn").click();
          return;
        }
        // X / Y — direct shortcut to sanctuary regardless of cursor
        if (idx === 2 || idx === 3) {
          document.getElementById("sanctuaryBtn").click(); return;
        }
        return;
      }

      // ── Narrative card ────────────────────────────────────────
      const narEl = document.getElementById("narrativeCard");
      if (narEl) {
        if (idx === 0 || idx === 1 || idx === 9) { narEl.click(); return; }
        return;
      }

      // ── Stargate overlay ──────────────────────────────────────
      // ── Stargate overlay ──────────────────────────────────────
      // Navigation handled in poll branch (own debounce). _onPress = confirm/close only.
      const sgEl = document.getElementById("stargateOverlay");
      if (sgEl) {
        if (idx === 0 || idx === 9) { // A / Start — confirm
          const dests = sgEl._sgDestinations || [];
          if (dests.length > 0 && dests[sgEl._sgIdx]) dests[sgEl._sgIdx].action();
          return;
        }
        if (idx === 1) { // B — close
          sgEl.remove(); timeScale = 1.0; return;
        }
        return;
      }

      // ── Gate tile on khem map (A near gate) — must come before zone prompt ─
      if (currentRealm !== "sanctuary" && gateOnMap && (idx === 0 || idx === 9)) {
        const dist = Math.abs(player.gridX - gateTileX) + Math.abs(player.gridY - gateTileY);
        if (dist <= 2) { showStargateOverlay(); return; }
      }
      // ── Sanctuary item placement ─────────────────────────────
      // idx 0=A, 7=RT button, 9=Start — any confirm while item selected
      if (currentRealm === "sanctuary" && buildSelectedItem && (idx === 0 || idx === 7 || idx === 9)) {
        if (gpAimActive || idx === 7) {
          // Aim mode or RT press: place at snapped tile position
          const _bsx = gpAimBuildTileX, _bsy = gpAimBuildTileY;
          const prevX = player.gridX, prevY = player.gridY;
          player.gridX = _bsx; player.gridY = _bsy;
          tryPlaceItem();
          player.gridX = prevX; player.gridY = prevY;
        } else {
          // No aim: place at player's current tile
          tryPlaceItem();
        }
        return;
      }
      // ── Sanctuary stargate (A near centre tile) ──────────────
      if (currentRealm === "sanctuary" && (idx === 0 || idx === 9)) {
        const cx = Math.floor(CONFIG.MAP_WIDTH / 2);
        const cy = Math.floor(CONFIG.MAP_HEIGHT / 2);
        const dist = Math.abs(player.gridX - cx) + Math.abs(player.gridY - cy);
        if (dist <= 2) { showStargateOverlay(); return; }
      }

      // ── Build menu ───────────────────────────────────────────
      // Build menu — d-pad nav in poll branch only (prevents double-fire)
      const bmEl = document.getElementById("buildMenu");
      if (bmEl) {
        if (idx === 0 || idx === 9) { window._selectBuildItem(_buildMenuIdx); return; }
        if (idx === 1) { bmEl.remove(); buildMenuOpen = false; buildSelectedItem = null; return; }
        return; // swallow all other buttons including d-pad
      }
      // Y button opens build menu in sanctuary
      if (idx === 3 && currentRealm === "sanctuary" && realmPhase === "hub") {
        showBuildMenu(); return;
      }
      // ── Shrine overlay ────────────────────────────────────────
      const shrineEl = document.getElementById("shrineOverlay");
      if (shrineEl) {
        if (idx === 14) { shrineEl._shrineSelect && shrineEl._shrineSelect(-1); return; }
        if (idx === 15) { shrineEl._shrineSelect && shrineEl._shrineSelect(1);  return; }
        if (idx === 12) { shrineEl._shrineNav   && shrineEl._shrineNav(-1);    return; }
        if (idx === 13) { shrineEl._shrineNav   && shrineEl._shrineNav(1);     return; }
        if (idx === 0  || idx === 9)  { shrineEl._shrineConfirm && shrineEl._shrineConfirm(); return; }
        if (idx === 1) { shrineEl._shrineLeave  && shrineEl._shrineLeave();    return; }
        return;
      }

      // ── Tutorial card ─────────────────────────────────────────
      if (idx === 0 && _tutCard.style.display !== "none") {
        if (_tutTimer) { clearTimeout(_tutTimer); _tutTimer = null; }
        _tutShowNext(); return;
      }
      _origOnPress(idx);
    };

    // Load persistent save data
    loadGame();
    setTimeout(() => tutTrigger("start"), 1500);

    // Open upgrade menu on mouse click.
    const upgradeButton = document.getElementById("upgradeButton");
    upgradeButton.addEventListener("click", function() {
      if (document.getElementById("shrineOverlay")) return;
      const menu = document.getElementById("upgradeMenu");
      if (!isUpgradeMenuVisible && !menu.classList.contains("menu-closing")) {
        showUpgradeMenu(false);
        upgradeButton.style.display = "none";
      }
    });

    document.addEventListener("keydown", function(e) {
      if ((e.key === "Enter" || e.keyCode === 13) && !isUpgradeMenuVisible) {
        if (document.getElementById("shrineOverlay")) return;
        showUpgradeMenu(false);
        upgradeButton.style.display = "none";
      }
      if (e.key === "e" || e.key === "E") {
        _stargateKeyPressed = true;
        if (currentRealm !== "sanctuary" && gateOnMap) {
          const dist = Math.abs(player.gridX - gateTileX) + Math.abs(player.gridY - gateTileY);
          if (dist <= 2) { showStargateOverlay(); }
        }
        // Place item in sanctuary
        if (currentRealm === "sanctuary" && buildSelectedItem) {
          tryPlaceItem();
        }
      }
      // Build mode toggle in sanctuary
      if ((e.key === "b" || e.key === "B") && currentRealm === "sanctuary" && realmPhase === "hub") {
        showBuildMenu();
      }
    });

    
document.addEventListener("DOMContentLoaded", () => {
    const bgmButton = document.getElementById("toggleBGM");
    const backgroundAudio = new Audio();
    let isBGMPlaying = true; // Change this to false if you want it to start OFF

    // Playlist Setup
    const playlist = [
        "Baggy.mp3",
        "citiphex_untitled.mp3",
        "frontiers.mp3"
    ];
    let currentTrackIndex = 0;

    backgroundAudio.src = playlist[currentTrackIndex];
    backgroundAudio.volume = 0.5;
    backgroundAudio.loop = false;

    // Auto-play next track
    backgroundAudio.addEventListener("ended", () => {
        currentTrackIndex = (currentTrackIndex + 1) % playlist.length;
        backgroundAudio.src = playlist[currentTrackIndex];
        if (isBGMPlaying) {
            backgroundAudio.play().catch(err => console.log("Play error:", err));
        }
    });

    // ✅ Set the initial state of the button (don't attempt autoplay — blocked by browsers)
    function initializeBGM() {
        isBGMPlaying = false;
        bgmButton.innerHTML = "🔇 Play BGM";
    }

    // Call initialization function
    initializeBGM();

    // Toggle BGM Button Click
    bgmButton.addEventListener("click", function () {
        if (!isBGMPlaying) {
            backgroundAudio.play().then(() => {
                isBGMPlaying = true;
                bgmButton.innerHTML = "🔊";
            }).catch(err => console.log("Error playing music:", err));
        } else {
            backgroundAudio.pause();
            isBGMPlaying = false;
            bgmButton.innerHTML = "🔇";
        }
    });

    // Mobile: resume BGM on first touch (autoplay policy workaround)
    document.addEventListener("touchstart", function startMusic() {
        if (!isBGMPlaying) {
            backgroundAudio.play().then(() => {
                isBGMPlaying = true;
                bgmButton.innerHTML = "🔊";
            }).catch(err => console.log("Error playing music:", err));
        }
        document.removeEventListener("touchstart", startMusic);
    });
});
  </script>
